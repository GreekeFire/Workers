<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Internal API Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #050506; color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; padding: 24px 20px; max-width: 600px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #E07658; }
  .row { display: flex; gap: 8px; margin-bottom: 16px; }
  input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fafafa; font-size: 14px; padding: 12px 14px; font-family: inherit; }
  input:focus { outline: none; border-color: rgba(255,255,255,0.25); }
  button { padding: 12px 20px; border-radius: 10px; border: 1px solid rgba(224,118,88,0.3); background: rgba(224,118,88,0.12); color: #E07658; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:hover:not(:disabled) { background: rgba(224,118,88,0.2); }

  .result-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #76746E; margin-bottom: 6px; }
  .value { font-size: 14px; font-weight: 600; margin-bottom: 14px; line-height: 1.5; word-break: break-word; }
  .price { font-size: 28px; font-weight: 700; color: #6BE3A4; margin-bottom: 14px; }
  .meta { display: flex; gap: 16px; margin-bottom: 14px; }
  .meta-item { font-size: 12px; color: #76746E; }
  .meta-item span { color: #fafafa; font-weight: 600; }
  .img-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .img-thumb { width: 72px; height: 72px; border-radius: 8px; object-fit: cover; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; }
  .desc { font-size: 12px; color: #B8B6B0; white-space: pre-wrap; max-height: 200px; overflow-y: auto; line-height: 1.6; }

  .raw-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 10px; padding: 14px; }
  .raw-toggle { font-size: 12px; color: #76746E; cursor: pointer; margin-bottom: 8px; }
  .raw-toggle:hover { color: #fafafa; }
  pre { font-size: 11px; color: #76746E; font-family: ui-monospace, monospace; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; display: none; }
  pre.visible { display: block; }

  .error { background: rgba(224,88,88,0.1); border: 1px solid rgba(224,88,88,0.2); border-radius: 10px; padding: 14px; color: #E05858; font-size: 13px; }
  .ids { font-size: 11px; color: #76746E; margin-bottom: 14px; font-family: ui-monospace, monospace; }
</style>
</head>
<body>

<h1>Shopee Internal API — Test</h1>

<div class="row">
  <input type="url" id="url-input" placeholder="shopee.sg/product-name-i.shopid.itemid">
  <button id="fetch-btn" onclick="fetchProduct()">Fetch</button>
</div>

<div id="output"></div>

<script>
async function fetchProduct() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  const btn = document.getElementById('fetch-btn');
  const out = document.getElementById('output');
  btn.disabled = true;
  btn.textContent = 'Fetching…';
  out.innerHTML = '';

  try {
    const res  = await fetch(`/api/shopee-internal?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (data.error) {
      const ids = (data.shopid || data.itemid) ? `<div class="ids" style="margin-bottom:8px">shopid: ${esc(data.shopid||'?')} · itemid: ${esc(data.itemid||'?')}</div>` : '';
      const cookieBadge = `<div style="font-size:11px;margin-bottom:8px">Cookies: <span style="color:${data.hasCookies?'#6BE3A4':'#E05858'};font-weight:700">${data.hasCookies ? '✓ set' : '✗ not set'}</span></div>`;
      const rawHtml = data.raw ? `<div class="raw-card" style="margin-top:12px"><div class="raw-toggle" onclick="toggleRaw(this)">▶ Show raw JSON</div><pre>${esc(JSON.stringify(data.raw,null,2))}</pre></div>` : '';
      out.innerHTML = `<div class="error">${ids}${cookieBadge}Error: ${esc(data.error)}</div>${rawHtml}`;
      return;
    }

    const priceStr = data.priceMin === data.priceMax
      ? `$${data.priceMin}`
      : `$${data.priceMin} – $${data.priceMax}`;

    const imgs = (data.images || []).map(src =>
      `<img class="img-thumb" src="${esc(src)}" onclick="window.open('${esc(src)}','_blank')" title="Click to open">`
    ).join('');

    out.innerHTML = `
      <div class="result-card">
        <div class="ids">shopid: ${esc(data.shopid)} · itemid: ${esc(data.itemid)}</div>

        ${data.priceMin ? `<div class="label">Price</div><div class="price">${priceStr}</div>` : ''}

        <div class="meta">
          ${data.stock   != null ? `<div class="meta-item">Stock <span>${data.stock}</span></div>` : ''}
          ${data.sold    != null ? `<div class="meta-item">Sold <span>${data.sold}</span></div>` : ''}
          ${data.rating  != null ? `<div class="meta-item">Rating <span>${data.rating}★</span></div>` : ''}
        </div>

        <div class="label">Title</div>
        <div class="value">${esc(data.title)}</div>

        ${imgs ? `<div class="label">Images (${data.images.length})</div><div class="img-grid">${imgs}</div>` : ''}

        ${data.description ? `<div class="label">Description</div><div class="desc">${esc(data.description)}</div>` : ''}
      </div>

      <div class="raw-card">
        <div class="raw-toggle" onclick="toggleRaw(this)">▶ Show raw JSON</div>
        <pre>${esc(JSON.stringify(data.raw, null, 2))}</pre>
      </div>`;

  } catch (e) {
    out.innerHTML = `<div class="error">Request failed: ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Fetch';
  }
}

function toggleRaw(el) {
  const pre = el.nextElementSibling;
  pre.classList.toggle('visible');
  el.textContent = pre.classList.contains('visible') ? '▼ Hide raw JSON' : '▶ Show raw JSON';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchProduct();
});
</script>
</body>
</html>
