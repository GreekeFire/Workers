<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Collab — Workers</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050506">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="shared/config.js"></script>
<style>
  :root {
    --text-primary: #FAFAFA;
    --text-secondary: #B8B6B0;
    --text-tertiary: #76746E;
    --coral: #E07658;
    --success: #6BE3A4;
    --danger: #E05858;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.06);
    --card-radius: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #050506;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 72% 12%, rgba(107,227,164,0.10) 0%, transparent 58%),
      radial-gradient(ellipse at 22% 88%, rgba(224,118,88,0.10) 0%, transparent 55%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 20px) 20px 80px;
  }

  /* ── Name screen ── */
  #name-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #050506; z-index: 200; padding: 24px;
  }
  .name-card { width: 100%; max-width: 320px; text-align: center; }
  .name-card-icon { font-size: 40px; margin-bottom: 16px; }
  .name-card-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .name-card-sub { font-size: 14px; color: var(--text-tertiary); margin-bottom: 32px; }
  .name-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 18px; font-weight: 600;
    padding: 14px 16px; text-align: center;
    font-family: inherit; margin-bottom: 12px;
  }
  .name-input:focus { outline: none; border-color: rgba(224,118,88,0.5); }
  .name-submit-btn {
    width: 100%; padding: 14px; border-radius: 12px;
    border: 1px solid rgba(224,118,88,0.25);
    background: rgba(224,118,88,0.1);
    color: var(--coral); font-size: 16px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
  }
  .name-submit-btn:hover { background: rgba(224,118,88,0.18); }

  /* ── Top bar ── */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; padding-top: 4px;
  }
  .top-bar-title {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .top-bar-right { display: flex; align-items: center; gap: 8px; }
  .author-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    background: rgba(224,118,88,0.1);
    border: 1px solid rgba(224,118,88,0.2);
    border-radius: 20px;
    font-size: 12px; font-weight: 700;
    color: var(--coral); cursor: pointer;
    transition: background 0.15s;
  }
  .author-chip:hover { background: rgba(224,118,88,0.18); }
  .refresh-btn {
    background: none; border: 1px solid var(--card-border);
    border-radius: 8px; color: var(--text-tertiary);
    font-size: 11px; font-weight: 600; padding: 5px 10px;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
  }
  .refresh-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.12); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { display: inline-block; animation: spin 1s linear infinite; }

  /* ── Session bar ── */
  .session-bar { display: flex; gap: 8px; margin-bottom: 4px; }
  .sess-item {
    flex: 1; background: var(--card-bg);
    border: 1px solid var(--card-border); border-radius: 12px;
    padding: 12px 10px; display: flex; flex-direction: column;
    align-items: center; gap: 2px;
  }
  .sess-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-tertiary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
  }
  .sess-val { font-size: 20px; font-weight: 700; color: var(--text-primary); }
  .sess-val.green { color: var(--success); }
  .sess-val.coral { color: var(--coral); }

  /* ── Sync status ── */
  .sync-status {
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    text-align: right; padding: 4px 2px 8px; min-height: 20px;
    opacity: 0; transition: opacity 0.3s; color: var(--text-tertiary);
  }
  .sync-status.visible { opacity: 1; }
  .sync-status.synced { color: var(--success); }
  .sync-status.error { color: var(--danger); }

  /* ── Seg toggle ── */
  .seg-toggle {
    display: flex; background: rgba(20,20,22,0.72);
    border: 1px solid var(--card-border); border-radius: 12px;
    padding: 4px; margin-bottom: 24px;
  }
  .seg-btn {
    flex: 1; padding: 10px; border-radius: 9px; border: none;
    background: transparent; color: var(--text-tertiary);
    font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
    cursor: pointer; transition: all 0.15s;
  }
  .seg-btn.active {
    background: rgba(255,255,255,0.10); color: var(--text-primary);
    box-shadow: inset 0 -2px 0 var(--coral);
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: var(--card-radius); padding: 20px; margin-bottom: 16px;
  }

  /* ── Form elements ── */
  .field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .field-label { font-size: 11px; color: var(--text-tertiary); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

  .ai-field {
    width: 100%; background: rgba(255,255,255,0.03);
    border: 1px solid var(--card-border); border-radius: 8px;
    color: var(--text-primary); font-size: 13px; padding: 10px 12px;
    resize: none; overflow: hidden; font-family: inherit;
    margin-bottom: 8px; display: block;
  }
  .ai-field:focus { outline: none; border-color: rgba(255,255,255,0.15); }

  .title-input {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    color: var(--text-primary); font-size: 17px; font-weight: 600;
    line-height: 1.45; padding: 10px 12px;
    resize: none; overflow: hidden; font-family: inherit;
    margin-bottom: 16px; display: block;
  }
  .title-input:focus { outline: none; border-color: rgba(255,255,255,0.18); }

  .form-input {
    width: 100%; background: rgba(255,255,255,0.03);
    border: 1px solid var(--card-border); border-radius: 10px;
    color: var(--text-primary); font-size: 14px; padding: 12px 14px;
    font-family: inherit;
  }
  .form-input:focus { outline: none; border-color: rgba(255,255,255,0.15); }

  .link-edit-input {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    color: var(--text-primary); font-size: 12px; padding: 8px 10px;
    font-family: inherit;
  }
  .link-edit-input:focus { outline: none; border-color: rgba(255,255,255,0.25); }

  .ai-key-inline { display: flex; gap: 8px; margin-bottom: 8px; }
  .ai-key-input {
    flex: 1; background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border); border-radius: 8px;
    color: var(--text-primary); font-size: 13px; padding: 8px 10px;
    font-family: monospace;
  }
  .ai-key-input:focus { outline: none; border-color: rgba(255,255,255,0.18); }

  .shopee-collapsed {
    font-size: 12px; color: var(--text-tertiary);
    padding: 6px 0; cursor: pointer; margin-bottom: 8px;
  }
  .shopee-collapsed:hover { color: var(--text-secondary); }
  .ai-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .ai-loading { font-size: 13px; color: var(--text-tertiary); padding: 8px 0; }

  /* ── Buttons ── */
  .copy-btn {
    background: none; border: 1px solid var(--card-border); border-radius: 6px;
    color: var(--text-tertiary); font-size: 11px; font-weight: 600;
    padding: 4px 10px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .copy-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.15); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }

  .ai-gen-btn {
    padding: 6px 14px; border-radius: 8px;
    background: rgba(224,118,88,0.12); border: 1px solid rgba(224,118,88,0.25);
    color: var(--coral); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .ai-gen-btn:hover { background: rgba(224,118,88,0.2); }
  .ai-gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-save {
    width: 100%; padding: 16px; border-radius: 14px;
    border: 1px solid rgba(107,227,164,0.25);
    background: rgba(107,227,164,0.08);
    color: var(--success); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; margin-top: 16px;
  }
  .btn-save:hover { background: rgba(107,227,164,0.15); }

  .btn-clear {
    width: 100%; padding: 12px; border-radius: 12px;
    border: 1px solid var(--card-border); background: transparent;
    color: var(--text-tertiary); font-size: 13px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
  }

  /* ── Price calc ── */
  .price-calc {
    display: flex; align-items: center; gap: 12px;
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--card-border);
  }
  .pcol { flex: 1; }
  .pcol-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
  .pcol-input-wrap { display: flex; align-items: center; gap: 4px; }
  .pcol-currency { font-size: 14px; color: var(--text-tertiary); }
  .cost-input {
    flex: 1; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    color: var(--text-primary); font-size: 16px; font-weight: 600;
    padding: 8px 10px; font-family: inherit; width: 100%;
  }
  .cost-input:focus { outline: none; border-color: rgba(255,255,255,0.28); }
  .cost-input::-webkit-inner-spin-button,
  .cost-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .cost-input { -moz-appearance: textfield; }
  .parrow { font-size: 18px; color: var(--text-tertiary); padding-top: 18px; flex-shrink: 0; }
  .sell-display { font-size: 22px; font-weight: 700; color: var(--success); margin-top: 2px; }

  .url-section {
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--card-border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .link-btn {
    padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    text-decoration: none; border: 1px solid var(--card-border);
    color: var(--text-secondary); background: rgba(255,255,255,0.03);
    transition: all 0.15s;
  }
  .link-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.07); }

  /* ── Done list ── */
  .done-search-wrap { margin-bottom: 12px; }
  .done-list { display: flex; flex-direction: column; gap: 8px; }
  .done-entry {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 14px 16px;
    cursor: pointer; transition: background 0.15s;
  }
  .done-entry:hover { background: rgba(255,255,255,0.06); }
  .done-entry.editing { cursor: default; }
  .done-entry.editing:hover { background: var(--card-bg); }

  .done-entry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .author-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 20px; flex-shrink: 0;
  }
  .author-tag.mine { background: rgba(224,118,88,0.12); color: var(--coral); border: 1px solid rgba(224,118,88,0.2); }
  .author-tag.partner { background: rgba(107,227,164,0.10); color: var(--success); border: 1px solid rgba(107,227,164,0.2); }
  .done-time { font-size: 11px; color: var(--text-tertiary); margin-left: auto; flex-shrink: 0; }
  .done-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .done-meta { font-size: 11px; color: var(--text-tertiary); }
  .done-links { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

  .done-edit-fields { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .done-edit-title {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    color: var(--text-primary); font-size: 14px; font-weight: 600;
    padding: 9px 12px; font-family: inherit;
  }
  .done-edit-title:focus { outline: none; border-color: rgba(255,255,255,0.25); }
  .done-edit-row { display: flex; align-items: center; gap: 10px; }
  .done-edit-cost {
    width: 90px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    color: var(--text-primary); font-size: 14px; font-weight: 600;
    padding: 7px 10px; font-family: inherit;
  }
  .done-edit-cost:focus { outline: none; border-color: rgba(255,255,255,0.25); }
  .done-edit-cost::-webkit-inner-spin-button,
  .done-edit-cost::-webkit-outer-spin-button { -webkit-appearance: none; }
  .done-edit-cost { -moz-appearance: textfield; }
  .done-edit-sell { font-size: 16px; font-weight: 700; color: var(--success); }
  .done-edit-actions { display: flex; gap: 8px; margin-top: 8px; }
  .btn-sm-cancel {
    flex: 1; padding: 10px; border-radius: 10px;
    border: 1px solid var(--card-border); background: transparent;
    color: var(--text-tertiary); font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-sm-save {
    flex: 2; padding: 10px; border-radius: 10px;
    border: 1px solid rgba(107,227,164,0.25); background: rgba(107,227,164,0.08);
    color: var(--success); font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-sm-delete {
    width: 100%; padding: 10px; border-radius: 10px; margin-top: 6px;
    border: 1px solid rgba(224,88,88,0.25); background: transparent;
    color: var(--danger); font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .done-empty { text-align: center; color: var(--text-tertiary); font-size: 13px; padding: 24px 0; }

  /* ── Sales ── */
  .revenue-card { text-align: center; }
  .revenue-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
  .revenue-amount { font-size: 36px; font-weight: 700; color: var(--success); }
  .log-form { display: flex; flex-direction: column; gap: 10px; }
  .btn-log {
    width: 100%; padding: 14px; border-radius: 12px;
    border: 1px solid rgba(224,118,88,0.25); background: rgba(224,118,88,0.1);
    color: var(--coral); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-log:hover { background: rgba(224,118,88,0.18); }
  .sales-list { display: flex; flex-direction: column; gap: 8px; }
  .sale-entry {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sale-info { flex: 1; min-width: 0; }
  .sale-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sale-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
  .sale-price { font-size: 16px; font-weight: 700; color: var(--success); margin-left: 12px; flex-shrink: 0; }

  /* ── Search dropdown ── */
  .search-wrap { position: relative; }
  .search-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: rgba(18,18,20,0.98); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; overflow: hidden; z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,0.7);
  }
  .search-result { padding: 12px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover { background: rgba(255,255,255,0.06); }
  .search-result-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .search-result-meta { font-size: 11px; color: var(--text-tertiary); }
  .sale-listing-info {
    display: flex; gap: 10px; align-items: center;
    padding: 8px 12px; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; flex-wrap: wrap;
  }
  .sale-info-price { font-size: 13px; color: var(--success); font-weight: 700; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,22,0.92); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 10px 20px;
    font-size: 13px; font-weight: 600; color: var(--text-primary);
    backdrop-filter: blur(12px); opacity: 0; transition: all 0.25s ease;
    pointer-events: none; z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .ai-field, .form-input { font-size: 16px; }
    .seg-btn { padding: 12px; font-size: 14px; }
    .search-result { padding: 16px 14px; }
  }
</style>
</head>
<body>

<!-- Name setup screen -->
<div id="name-screen">
  <div class="name-card">
    <div class="name-card-icon">👥</div>
    <div class="name-card-title">Workers Collab</div>
    <div class="name-card-sub">What should we call you?</div>
    <input class="name-input" id="name-input" type="text" placeholder="Your name"
      maxlength="20" autocomplete="off" onkeydown="if(event.key==='Enter')saveName()">
    <button class="name-submit-btn" onclick="saveName()">Let's go →</button>
  </div>
</div>

<!-- Main app -->
<div id="app" style="display:none">
  <div class="container">

    <!-- Top bar -->
    <div class="top-bar">
      <div class="top-bar-title">Collab</div>
      <div class="top-bar-right">
        <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">⟳ Sync</button>
        <div class="author-chip" onclick="promptChangeName()">
          <span id="author-label"></span>
          <span style="font-size:10px;opacity:0.6">▾</span>
        </div>
      </div>
    </div>

    <!-- Session bar -->
    <div class="session-bar">
      <div class="sess-item">
        <span class="sess-label">My Done</span>
        <span class="sess-val green" id="cnt-mine">0</span>
      </div>
      <div class="sess-item">
        <span class="sess-label" id="partner-label">Partner</span>
        <span class="sess-val" id="cnt-partner">0</span>
      </div>
      <div class="sess-item">
        <span class="sess-label">Revenue</span>
        <span class="sess-val coral" id="cnt-revenue">$0.00</span>
      </div>
    </div>
    <div class="sync-status" id="sync-status"></div>

    <!-- Tab toggle -->
    <div class="seg-toggle">
      <button class="seg-btn active" id="btn-create" onclick="switchTab('create')">CREATE</button>
      <button class="seg-btn" id="btn-done"   onclick="switchTab('done')">DONE</button>
      <button class="seg-btn" id="btn-sales"  onclick="switchTab('sales')">SALES</button>
    </div>

    <!-- CREATE -->
    <div id="view-create"><div id="create-wrap"></div></div>

    <!-- DONE -->
    <div id="view-done" style="display:none">
      <div class="done-search-wrap">
        <input type="text" class="form-input" id="done-search"
          placeholder="Search done listings…" autocomplete="off"
          oninput="editingDoneId=null;renderDoneView()">
      </div>
      <div class="done-list" id="done-list"></div>
    </div>

    <!-- SALES -->
    <div id="view-sales" style="display:none">
      <div class="card revenue-card">
        <div class="revenue-label">Revenue Today</div>
        <div class="revenue-amount" id="revenue-display">$0.00</div>
      </div>
      <div class="card log-form">
        <div class="search-wrap">
          <input type="text" class="form-input" id="sale-listing"
            placeholder="Search listing…" autocomplete="off"
            oninput="searchSaleListing(this.value)" onblur="hideSaleDropdown()">
          <div class="search-dropdown" id="sale-dropdown" style="display:none"></div>
        </div>
        <div class="sale-listing-info" id="sale-listing-info" style="display:none"></div>

// ── Helpers ───────────────────────────────────────────────────────────────
function calcSell(cost) {
  const c = parseFloat(cost) || 0;
  return Math.ceil(Math.max(c * 1.5, c + 24) / 5) * 5;
}
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function relTime(iso) {
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return new Date(iso).toLocaleDateString('en-SG', { month: 'short', day: 'numeric' });
}
function makeId() {
  return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
}
function todayStr() { return new Date().toISOString().slice(0, 10); }

// ── Supabase sync ─────────────────────────────────────────────────────────
async function syncFromSupabase(silent = false) {
  if (!silent) setSyncStatus('syncing');
  try {
    const [dRes, sRes] = await Promise.all([
      sb.from('app_state').select('data').eq('key', 'collab_done_data').single(),
      sb.from('app_state').select('data').eq('key', 'collab_sales').single()
    ]);
    if (dRes.data?.data) collabDone  = dRes.data.data;
    if (sRes.data?.data) collabSales = sRes.data.data;
    if (!silent) setSyncStatus('synced');
    renderAll();
  } catch (e) {
    console.warn('Sync error:', e);
    if (!silent) setSyncStatus('error');
  }
}

// Fetch-merge-push: safe for concurrent saves by two people
async function pushDone(newEntry) {
  setSyncStatus('syncing');
  try {
    const { data } = await sb.from('app_state').select('data').eq('key', 'collab_done_data').single();
    const latest   = data?.data || [];
    const merged   = [newEntry, ...latest.filter(e => e.id !== newEntry.id)];
    await sb.from('app_state').upsert({ key: 'collab_done_data', data: merged, updated_at: new Date().toISOString() });
    collabDone = merged;
    setSyncStatus('synced');
    renderSessionBar();
  } catch (e) { console.warn('Push error:', e); setSyncStatus('error'); }
}

async function pushDoneUpdate() {
  setSyncStatus('syncing');
  try {
    await sb.from('app_state').upsert({ key: 'collab_done_data', data: collabDone, updated_at: new Date().toISOString() });
    setSyncStatus('synced');
  } catch (e) { console.warn('Push error:', e); setSyncStatus('error'); }
}

async function pushSales() {
  try {
    await sb.from('app_state').upsert({ key: 'collab_sales', data: collabSales, updated_at: new Date().toISOString() });

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  clearTimeout(syncStatusTimer);
  el.className = 'sync-status visible ' + state;
  if (state === 'syncing') {
    el.textContent = '⟳ Syncing…';
  } else if (state === 'synced') {
    el.textContent = '✓ Synced';
    syncStatusTimer = setTimeout(() => { el.className = 'sync-status'; }, 3000);
  } else {
    el.textContent = '✗ Sync failed';
    syncStatusTimer = setTimeout(() => { el.className = 'sync-status'; }, 5000);
  }
}

async function manualRefresh() {

  span.className = 'spinning';
  span.textContent = '⟳';
  icon.innerHTML = '';
  icon.appendChild(span);
  icon.appendChild(document.createTextNode(' Sync'));

// ── AI ────────────────────────────────────────────────────────────────────
const TITLE_SYSTEM = `You are a Carousell Singapore SEO copywriter.

TASK: Write a Carousell listing title for the product below. Output the title text only — no JSON, no explanation, no quotes, nothing else.

RULES:
1. Length: exactly 200–225 characters. Count every character. This is the strictest rule.
2. Format: Title Case keyword phrases separated by | (pipe). Each segment is 2–4 words — never a single word alone.
3. Front-load the strongest buyer search terms in the first 50 characters.
4. Every segment must be something a real buyer types into a search bar.
5. Never repeat the same root word across segments.
6. Correct any spelling errors found in the source text — do not copy typos.
7. Never use: brand names, model numbers or SKUs, platform names (Shopee, Carousell, Lazada, Amazon), seller phrases, !, @, #, $, %, *, &, emojis, "Brand New", "Free Shipping", "nice", "cheap", "best", sentences, em-dash (—).

CORRECT EXAMPLE (219 chars):
Automatic Pet Water Dispenser | Wireless Rechargeable | Motion Sensor | 2.5L Capacity | 4000mAh Battery | Dual Power Supply | 110 Days Runtime | Smart Timing Mode | Pet Fountain | Water Bowl | Indoor Outdoor

Before outputting, silently count the characters. If under 200 or over 225, rewrite. Output only the final title.`;

const DESC_SYSTEM = `You are a Carousell Singapore listing copywriter. Output ONLY a JSON object with one key: {"description":"..."}

Rewrite the product description for a Carousell listing. Plain text only inside the JSON — no **bold**, no #headers, no markdown.

TONE: Friendly, direct, benefits-focused. No hype words. No "high quality", "amazing", "best".

Use exactly this structure:

[Product name — one clear descriptive phrase, no brand names]
[One sentence: what this is and the main benefit it gives the buyer]

WHY YOU'LL LOVE IT:
• [Specific benefit]
• [Practical benefit — size, ease of use, time-saving]
• [Emotional benefit]
• [Quality/durability note — if known]

PERFECT FOR:
[2–3 specific situations]

WHAT'S INCLUDED:
[Exactly what comes in the package]

SPECIFICATIONS (skip any unknown values — do not write "Not specified"):
• Material: [confirmed only]
• Dimensions: [confirmed only]
• Weight: [confirmed only]
• Colours available: [confirmed only]

WHY BUY FROM ME:
✓ Fast Singapore shipping
✓ Quality checked before sending
✓ Secure packaging
✓ Responsive customer service

---
DM me for bulk discounts or questions!`;

async function callClaude(apiKey, system, userContent, maxTokens, retries = 2) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    let resp, data;
    try {
      resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
          'content-type': 'application/json'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: maxTokens, temperature: 0.3, system,
          messages: [{ role: 'user', content: userContent }]
        })
      });
      data = await resp.json();
    } catch (e) {
      if (attempt < retries) { await new Promise(r => setTimeout(r, 2000 * (attempt + 1))); continue; }
      throw e;
    }
    if (data.error) {
      const isOverload = data.error.type === 'overloaded_error' || resp.status === 529;
      if (isOverload && attempt < retries) { await new Promise(r => setTimeout(r, 3000)); continue; }
      throw new Error(data.error.message);
    }
    return data.content?.[0]?.text || '';
  }
}

async function runAIGenerate(productText) {
  const apiKey = localStorage.getItem('alfred_claude_key');
  if (!apiKey) throw new Error('NO_KEY');
  const content = `Product info:\n\n${productText}`;
  const [titleText, descText] = await Promise.all([
    callClaude(apiKey, TITLE_SYSTEM, content, 512),
    callClaude(apiKey, DESC_SYSTEM,  content, 1536)
  ]);
  let title = titleText.trim().split('\n')[0].trim();
  if (title.length < 200) {
    const retry = await callClaude(apiKey, TITLE_SYSTEM,
      content + '\n\nIMPORTANT: Previous attempt was too short. You MUST reach at least 200 characters.', 512);
    title = retry.trim().split('\n')[0].trim();
  }
  if (title.length > 225) {
    const parts = title.split(' | ');
    while (parts.length > 1 && parts.join(' | ').length > 225) parts.pop();
    title = parts.join(' | ');
  }
  const descMatch = descText.match(/\{[\s\S]*\}/);
  const desc = descMatch ? (JSON.parse(descMatch[0]).description || '') : '';
  return { title, desc };
}

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (val) {
    localStorage.setItem('alfred_claude_key', val);
    apiKeyVisible = false;
    toast('Key saved');
    generateAI();
  }
}

async function generateAI() {
  const apiKey = localStorage.getItem('alfred_claude_key');
  if (!apiKey) { apiKeyVisible = true; renderCreateView(); return; }
  const taEl = document.getElementById('shopee-ta');
  if (taEl) shopeeInput = taEl.value;
  if (!shopeeInput.trim()) { toast('Paste Shopee info first'); return; }
  aiLoading = true; renderCreateView();
  try {
    const { title, desc } = await runAIGenerate(shopeeInput);
    aiTitle = title; aiDesc = desc;
    if (aiTitle || aiDesc) shopeeCollapsed = true;
    if (!aiTitle && !aiDesc) toast('No content returned — try again');
  } catch (e) {
    if (e.message === 'NO_KEY') { apiKeyVisible = true; aiLoading = false; renderCreateView(); return; }
    toast('Error: ' + (e.message || 'Unknown error'));
  }
  aiLoading = false; renderCreateView();
}

async function saveListing() {
  const titleEl  = document.getElementById('title-ta');
  const costEl   = document.getElementById('cost-input');
  const shopeeEl = document.getElementById('shopee-url');
  const caroEl   = document.getElementById('caro-url');
  const descEl   = document.getElementById('desc-ta');
  if (titleEl)  aiTitle     = titleEl.value.trim();
  if (descEl)   aiDesc      = descEl.value.trim();
  if (costEl)   newCost     = costEl.value;
  if (shopeeEl) newShopeeUrl = shopeeEl.value.trim();
  if (caroEl)   newCaroUrl  = caroEl.value.trim();
  if (!aiTitle) { toast('Add a title first'); return; }

  const cost = parseFloat(newCost) || 0;
  const entry = {
    id: makeId(), author: myName, title: aiTitle, description: aiDesc,
    shopeeUrl: newShopeeUrl, carousellUrl: newCaroUrl,
    sourceCost: cost, sellPrice: calcSell(cost),
    doneAt: new Date().toISOString()
  };

  // Optimistic: show immediately, push in background
  collabDone.unshift(entry);
  clearCreate();
  renderSessionBar();
  switchTab('done');
  toast('Saved ✓');
  await pushDone(entry);
}

function clearCreate() {
  aiTitle = ''; aiDesc = ''; shopeeInput = ''; newCost = '';
  newShopeeUrl = ''; newCaroUrl = ''; shopeeCollapsed = false;
  aiLoading = false;
  renderCreateView();
}

// ── DONE tab ──────────────────────────────────────────────────────────────
function renderDoneView() {
  const query    = (document.getElementById('done-search')?.value || '').toLowerCase();
  const list     = document.getElementById('done-list');
  const filtered = collabDone
    .map((d, i) => ({ ...d, _i: i }))
    .filter(d => !query || d.title.toLowerCase().includes(query));

  if (filtered.length === 0) {
    list.innerHTML = `<p class="done-empty">${collabDone.length === 0 ? 'No listings yet — go to Create!' : 'No matches'}</p>`;
    return;
  }

  list.innerHTML = filtered.map(d => {
    const isMine     = d.author === myName;
    const authorClass = isMine ? 'mine' : 'partner';
    const shopeeLink = d.shopeeUrl    ? `<a class="link-btn" href="${esc(d.shopeeUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Shopee ↗</a>` : '';
    const caroLink   = d.carousellUrl ? `<a class="link-btn" href="${esc(d.carousellUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Carousell ↗</a>` : '';
    const linkBtns   = (shopeeLink || caroLink) ? `<div class="done-links">${shopeeLink}${caroLink}</div>` : '';

    if (editingDoneId === d.id) {
      return `<div class="done-entry editing">
        <div class="done-entry-header">
          <span class="author-tag ${authorClass}">${esc(d.author)}</span>
          <span class="done-time">${relTime(d.doneAt)}</span>
        </div>
        <div class="done-edit-fields">
          <input class="done-edit-title" type="text" value="${esc(d.title)}" id="et-${d.id}" placeholder="Title">
          <div class="done-edit-row">
            <span style="font-size:13px;color:var(--text-tertiary)">Cost $</span>
            <input class="done-edit-cost" type="number" step="0.01" value="${d.sourceCost}"
              id="ec-${d.id}" oninput="updateEditSell('${d.id}',this.value)">
            <span style="color:var(--text-tertiary)">→</span>
            <span class="done-edit-sell" id="es-${d.id}">$${d.sellPrice}</span>
          </div>
          <input class="link-edit-input" type="url" placeholder="Shopee URL"
            value="${esc(d.shopeeUrl||'')}" id="esh-${d.id}">
          <input class="link-edit-input" type="url" placeholder="Carousell URL"
            value="${esc(d.carousellUrl||'')}" id="eco-${d.id}">
        </div>
        <div class="done-edit-actions">
          <button class="btn-sm-cancel" onclick="editingDoneId=null;renderDoneView()">Cancel</button>
          <button class="btn-sm-save" onclick="saveDoneEdit('${d.id}')">Save</button>
        </div>
        ${isMine ? `<button class="btn-sm-delete" onclick="deleteDoneEntry('${d.id}')">Delete listing</button>` : ''}
      </div>`;
    }

    return `<div class="done-entry" onclick="editingDoneId='${d.id}';renderDoneView()">
      <div class="done-entry-header">
        <span class="author-tag ${authorClass}">${esc(d.author)}</span>
        <span class="done-time">${relTime(d.doneAt)}</span>
      </div>
      <div class="done-title">${esc(d.title)}</div>
      <div class="done-meta">Cost $${d.sourceCost} → Sell $${d.sellPrice}</div>
      ${linkBtns}
    </div>`;
  }).join('');
}

function updateEditSell(id, val) {
  const el = document.getElementById(`es-${id}`);
  if (el) el.textContent = '$' + calcSell(parseFloat(val) || 0);
}

async function saveDoneEdit(id) {
  const title       = document.getElementById(`et-${id}`)?.value?.trim();
  const cost        = parseFloat(document.getElementById(`ec-${id}`)?.value) || 0;
  const shopeeUrl   = document.getElementById(`esh-${id}`)?.value?.trim() || '';
  const carousellUrl = document.getElementById(`eco-${id}`)?.value?.trim() || '';
  if (!title) { toast('Title cannot be empty'); return; }
  const idx = collabDone.findIndex(d => d.id === id);
  if (idx === -1) return;
  collabDone[idx] = { ...collabDone[idx], title, sourceCost: cost, sellPrice: calcSell(cost), shopeeUrl, carousellUrl };
  editingDoneId = null;
  renderDoneView(); renderSessionBar();
  toast('Saved');
  await pushDoneUpdate();
}

async function deleteDoneEntry(id) {
  if (!confirm('Remove this listing?')) return;
  collabDone = collabDone.filter(d => d.id !== id);
  editingDoneId = null;
  renderDoneView(); renderSessionBar();
  toast('Removed');
  await pushDoneUpdate();
}

      <div class="search-result-meta">Sell $${d.sellPrice} · ${esc(d.author)}</div>

  if (!d) return;
  document.getElementById('sale-listing').value = d.title;
  document.getElementById('sale-dropdown').style.display = 'none';
  document.getElementById('sale-price').value = d.sellPrice;
  const info = document.getElementById('sale-listing-info');
  info.innerHTML = `<span class="sale-info-price">$${d.sellPrice}</span>
    <span style="font-size:12px;color:var(--text-tertiary)">${esc(d.author)}</span>`;
  info.style.display = 'flex';
  document.getElementById('sale-price').focus();
}

function hideSaleDropdown() {
  setTimeout(() => { const el = document.getElementById('sale-dropdown'); if (el) el.style.display = 'none'; }, 150);
}

async function logSale() {
  const name  = document.getElementById('sale-listing').value.trim();
  const price = parseFloat(document.getElementById('sale-price').value);
  if (!name || isNaN(price) || price <= 0) { toast('Fill in listing and price'); return; }
  const entry = { name, price, author: myName, date: todayStr(), ts: new Date().toISOString() };
  collabSales.unshift(entry);
  document.getElementById('sale-listing').value = '';
  document.getElementById('sale-price').value   = '';
  document.getElementById('sale-listing-info').style.display = 'none';
  renderSalesView(); renderSessionBar();
  toast('Logged ✓');
  await pushSales();
}

// ── Routing ───────────────────────────────────────────────────────────────
function renderAll() {
  renderSessionBar();
  if      (activeTab === 'create') renderCreateView();
  else if (activeTab === 'done')   renderDoneView();
  else                             renderSalesView();
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('view-create').style.display = tab === 'create' ? 'block' : 'none';
  document.getElementById('view-done').style.display   = tab === 'done'   ? 'block' : 'none';
  document.getElementById('view-sales').style.display  = tab === 'sales'  ? 'block' : 'none';
  ['create','done','sales'].forEach(t =>
    document.getElementById('btn-' + t).classList.toggle('active', t === tab)
  );
  if      (tab === 'create') renderCreateView();
  else if (tab === 'done')   renderDoneView();
  else                       renderSalesView();
}

// ── Toast & copy ──────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function copyField(fieldId, btnId) {
  const el = document.getElementById(fieldId);
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(() => {
    const btn = document.getElementById(btnId);
    if (btn) {
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      clearTimeout(copyTimers[btnId]);
      copyTimers[btnId] = setTimeout(() => {
        const b = document.getElementById(btnId);
        if (b) { b.textContent = 'Copy'; b.classList.remove('copied'); }
        delete copyTimers[btnId];
      }, 1500);
    }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  await syncFromSupabase();
  renderCreateView();
  setInterval(() => syncFromSupabase(true), 60000);
}

if (myName) {
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('author-label').textContent = myName;
  init();
}
</script>
