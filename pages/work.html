<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Work — Workers</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workers">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050506">
<link rel="icon" type="image/png" href="/icons/icon-192.png">
<link rel="manifest" href="/manifest.json">
<script src="/data/listings-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="/shared/shared.css">
<script src="/shared/config.js"></script>
<script src="/shared/utils.js"></script>
<style>
  :root {
    /* --coral = --accent from shared.css; --danger overrides shared's #FF6B6B with a softer red */
    --coral: var(--accent);
    --danger: #E05858;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #050506;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* body::before / body::after / @keyframes bgDrift — from shared.css */

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 24px) 20px calc(80px + env(safe-area-inset-bottom));
  }

  /* Session bar */
  .session-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .sess-item {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .sess-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .sess-val {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .sess-val.green { color: var(--success); }
  .sess-val.coral { color: var(--coral); }

  /* Segmented toggle */
  .seg-toggle {
    display: flex;
    background: rgba(20,20,22,0.72);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .seg-btn {
    flex: 1;
    padding: 10px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--text-tertiary);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .seg-btn.active {
    background: rgba(255,255,255,0.10);
    color: var(--text-primary);
    box-shadow: inset 0 -2px 0 var(--coral);
  }

  /* Progress line */
  .progress-line {
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: 16px;
  }

  /* Listing card */
  .listing-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    padding: 24px 20px;
    margin-bottom: 16px;
  }
  .title-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 17px;
    font-weight: 600;
    line-height: 1.45;
    padding: 10px 12px;
    resize: none;
    font-family: inherit;
    margin-bottom: 16px;
    display: block;
  }
  .title-input:focus { outline: none; border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); }
  .title-input { overflow: hidden; }
  .listing-links {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .link-btn {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    border: 1px solid var(--card-border);
    color: var(--text-secondary);
    background: rgba(255,255,255,0.03);
    transition: all 0.15s;
  }
  .link-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.07); }
  .link-edit-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 12px;
    padding: 6px 10px;
    font-family: inherit;
    min-width: 0;
  }
  .link-edit-input:focus { outline: none; border-color: rgba(255,255,255,0.25); }
  .listing-price {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .price-sell {
    color: var(--success);
    font-weight: 700;
    font-size: 16px;
  }
  .price-arrow { color: var(--text-tertiary); }

  /* AI section */
  .ai-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--card-border);
  }
  .ai-loading { font-size: 13px; color: var(--text-tertiary); padding: 8px 0; }
  .ai-field {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 13px;
    padding: 10px 12px;
    resize: none;
    overflow: hidden;
    font-family: inherit;
    margin-bottom: 8px;
    display: block;
  }
  .ai-field:focus { outline: none; border-color: rgba(255,255,255,0.15); }
  .ai-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .ai-key-inline { display: flex; gap: 8px; margin-bottom: 8px; }
  .ai-key-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 13px;
    padding: 8px 10px;
    font-family: var(--font-mono);
  }
  .ai-key-input:focus { outline: none; border-color: rgba(255,255,255,0.18); }
  .shopee-collapsed {
    font-size: 12px;
    color: var(--text-tertiary);
    padding: 6px 0;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .shopee-collapsed:hover { color: var(--text-secondary); }
  .shopee-fetch-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .shopee-fetch-btn {
    white-space: nowrap; padding: 9px 14px; flex-shrink: 0;
    border-radius: 8px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); color: var(--text-primary);
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .shopee-fetch-btn:hover    { background: rgba(255,255,255,0.11); }
  .shopee-fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .shopee-img-grid {
    display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 10px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .shopee-img-grid::-webkit-scrollbar { display: none; }
  .shopee-img-thumb {
    flex-shrink: 0; width: 76px; height: 76px; border-radius: 9px; overflow: hidden;
    display: block; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
  }
  .shopee-img-thumb { position: relative; }
  .shopee-img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .shopee-img-dl {
    position: absolute; bottom: 3px; right: 3px;
    background: rgba(0,0,0,0.65); color: #fff;
    border-radius: 4px; padding: 2px 5px; font-size: 10px; font-weight: 700;
    text-decoration: none; line-height: 1.4; pointer-events: auto;
  }
  .char-counter {
    font-size: 11px; color: var(--text-tertiary);
    text-align: right; margin-top: -8px; margin-bottom: 10px;
  }
  .char-counter.warn   { color: var(--warning); }
  .char-counter.danger { color: var(--danger); }
  .copy-btn {
    background: none;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .copy-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.15); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }
  .field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .field-label { font-size: 11px; color: var(--text-tertiary); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .ai-gen-btn {
    padding: 6px 14px;
    border-radius: 8px;
    background: rgba(224,118,88,0.12);
    border: 1px solid rgba(224,118,88,0.25);
    color: var(--coral);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ai-gen-btn:hover { background: rgba(224,118,88,0.2); }
  .ai-gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .api-key-section { margin-top: 10px; }
  .api-key-row { display: flex; gap: 8px; }
  .api-key-input {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 12px;
    padding: 8px 12px;
    font-family: var(--font-mono);
  }
  .api-key-input:focus { outline: none; border-color: rgba(255,255,255,0.15); }
  .api-key-save-btn {
    padding: 8px 14px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--card-border);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Action row */
  .action-row { display: flex; gap: 12px; }
  .btn-delete {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid rgba(224,88,88,0.25);
    background: rgba(224,88,88,0.08);
    color: var(--danger);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-delete:hover { background: rgba(224,88,88,0.15); }
  .btn-done {
    flex: 2;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid rgba(107,227,164,0.25);
    background: rgba(107,227,164,0.08);
    color: var(--success);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-done:hover { background: rgba(107,227,164,0.15); }

  /* Queue complete */
  .queue-complete {
    text-align: center;
    padding: 48px 24px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    margin-bottom: 16px;
  }
  .queue-complete .big-check { font-size: 48px; margin-bottom: 16px; }
  .queue-complete h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .queue-complete p { font-size: 14px; color: var(--text-tertiary); }

  /* Sales section */
  .revenue-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
  }
  .revenue-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 4px;
  }
  .revenue-amount {
    font-size: 36px;
    font-weight: 700;
    color: var(--success);
  }
  .log-form-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    padding: 20px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 14px;
    padding: 12px 14px;
    font-family: inherit;
  }
  .form-input:focus { outline: none; border-color: rgba(255,255,255,0.15); }
  .btn-log {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(224,118,88,0.25);
    background: rgba(224,118,88,0.1);
    color: var(--coral);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-log:hover { background: rgba(224,118,88,0.18); }
  .sales-list { display: flex; flex-direction: column; gap: 8px; }
  .sale-entry {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sale-info { flex: 1; min-width: 0; }
  .sale-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sale-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
  .sale-price {
    font-size: 16px;
    font-weight: 700;
    color: var(--success);
    margin-left: 12px;
    flex-shrink: 0;
  }

  /* Search dropdown */
  .search-wrap { position: relative; }
  .search-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: rgba(18,18,20,0.98);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,0.7);
  }
  .search-result {
    padding: 12px 14px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover, .search-result:active { background: rgba(255,255,255,0.06); }
  .search-result-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .search-result-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .search-result-price { font-size: 11px; color: var(--text-tertiary); }
  .search-result-link { font-size: 11px; color: var(--coral); text-decoration: none; }
  .search-result-link:hover { text-decoration: underline; }
  .sale-listing-info {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .sale-info-price { font-size: 13px; color: var(--success); font-weight: 700; }
  .sale-info-link { font-size: 12px; color: var(--coral); text-decoration: none; }
  .sale-info-link:hover { text-decoration: underline; }

  /* Price calculator in Fix */
  .price-calc {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--card-border);
  }
  .pcol { flex: 1; }
  .pcol-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 6px;
  }
  .pcol-input-wrap { display: flex; align-items: center; gap: 4px; }
  .pcol-currency { font-size: 14px; color: var(--text-tertiary); }
  .cost-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 16px;
    font-weight: 600;
    padding: 8px 10px;
    font-family: inherit;
    width: 100%;
  }
  .cost-input:focus { outline: none; border-color: rgba(255,255,255,0.28); }
  .cost-input::-webkit-inner-spin-button,
  .cost-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .cost-input { -moz-appearance: textfield; }
  .parrow { font-size: 18px; color: var(--text-tertiary); padding-top: 18px; flex-shrink: 0; }
  .sell-display {
    font-size: 22px;
    font-weight: 700;
    color: var(--success);
    margin-top: 2px;
  }

  /* Done list */
  .done-search-wrap { margin-bottom: 12px; }
  .done-list { display: flex; flex-direction: column; gap: 8px; }
  .done-entry {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.15s;
  }
  .done-entry:hover { background: rgba(255,255,255,0.06); }
  .done-entry.editing { cursor: default; flex-direction: column; align-items: stretch; gap: 10px; }
  .done-entry.editing:hover { background: var(--card-bg); }
  .done-info { flex: 1; min-width: 0; }
  .done-title-text {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .done-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
  .done-edit-icon { font-size: 14px; color: var(--text-tertiary); margin-left: 12px; flex-shrink: 0; }
  .done-edit-title {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 600;
    padding: 9px 12px;
    font-family: inherit;
  }
  .done-edit-title:focus { outline: none; border-color: rgba(255,255,255,0.25); }
  .done-edit-price {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .done-edit-cost {
    width: 90px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 600;
    padding: 7px 10px;
    font-family: inherit;
  }
  .done-edit-cost:focus { outline: none; border-color: rgba(255,255,255,0.25); }
  .done-edit-cost::-webkit-inner-spin-button,
  .done-edit-cost::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .done-edit-cost { -moz-appearance: textfield; }
  .done-edit-sell { font-size: 16px; font-weight: 700; color: var(--success); }
  .done-edit-actions { display: flex; gap: 8px; }
  .done-cancel-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--text-tertiary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .done-link-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(224,118,88,0.25);
    background: rgba(224,118,88,0.08);
    color: var(--coral);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .done-link-inputs { display: flex; flex-direction: column; gap: 6px; }
  .done-save-btn {
    flex: 2;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(107,227,164,0.25);
    background: rgba(107,227,164,0.08);
    color: var(--success);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .done-empty { text-align: center; color: var(--text-tertiary); font-size: 13px; padding: 24px 0; }

  /* API key bar */
  .api-key-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 16px;
  }
  .api-key-bar-btn {
    background: none;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .api-key-bar-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.12); }
  .api-key-bar-btn.set { color: var(--success); border-color: rgba(107,227,164,0.25); }
  .api-key-bar-row { display: flex; gap: 8px; flex: 1; max-width: 320px; }
  .api-key-bar-field {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 12px;
    padding: 6px 10px;
    font-family: var(--font-mono);
  }
  .api-key-bar-field:focus { outline: none; border-color: rgba(255,255,255,0.18); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(80px + env(safe-area-inset-bottom) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);

<script>
function calcSell(cost) {
  const c = parseFloat(cost) || 0;
  return Math.ceil(Math.max(c * 1.5, c + 24) / 5) * 5 - 0.1;
}

function onCostChange(val) {
  editedCost = parseFloat(val) || 0;
  const el = document.getElementById('sell-display');
  if (el) el.textContent = '$' + calcSell(editedCost).toFixed(2);
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Returns today's date string YYYY-MM-DD (recomputed each call so midnight rollovers work)
function getToday() { return new Date().toISOString().slice(0, 10); }

// State
let currentIndex = 0;
let doneSet = new Set();
let deletedSet = new Set();
let doneData = [];
let doneTodayCount = 0;
let deletedTodayCount = 0;
let todayDate = getToday();
let salesLog = [];
let activeTab = 'fix';
let editingDoneIdx = null;

// AI state
let aiExpanded = false;
let aiLoading = false;
let aiTitle = '';
let aiDesc = '';
let editedCost = null;
let shopeeInput = '';
let shopeeCollapsed = false;
let apiKeyVisible = false;
let fixShopeeImages = [];
let fixShopeeFetching = false;
let fixFetchCollapsed = false;

// Undo / copy state
let undoTimer = null;
let pendingDeleteUndo = null;
const copyTimers = {};

// NEW tab state
let newTitle = '';
let newDesc = '';
let newShopeeInput = '';
let newCost = '';
let newShopeeUrl = '';
let newCaroUrl = '';
let newLoading = false;
let newShopeeCollapsed = false;
let newShopeeImages = [];
let newShopeeFetching = false;
let newApiKeyVisible = false;
let newFetchCollapsed = false;

// Link overrides
let linkEditing = false;
let doneLinkEditIdx = null;
let urlOverrides = {};

// Init
async function init() {
  loadLocal();
  currentIndex = findNext(currentIndex);
  renderAll();
  await syncFromSupabase();
  currentIndex = findNext(currentIndex);
  renderAll();
}

function loadLocal() {
  const today = getToday();
  const raw = localStorage.getItem('carobiz_work');
  if (raw) {
    const s = JSON.parse(raw);
    currentIndex = s.currentIndex || 0;
    doneSet = new Set(s.doneIndexes || []);
    deletedSet = new Set(s.deletedIndexes || []);
    doneData = s.doneData || [];
    if (s.todayDate === today) {
      doneTodayCount = s.doneTodayCount || 0;
      deletedTodayCount = s.deletedTodayCount || 0;
    }
    todayDate = today;
  }
  const rawSales = localStorage.getItem('carobiz_sales');
  if (rawSales) salesLog = JSON.parse(rawSales);
  const rawOverrides = localStorage.getItem('carobiz_url_overrides');
  if (rawOverrides) urlOverrides = JSON.parse(rawOverrides);
  // Restore NEW tab draft
  try {
    const rawDraft = localStorage.getItem('carobiz_new_draft');
    if (rawDraft) {
      const d = JSON.parse(rawDraft);
      newTitle      = d.title      || '';
      newDesc       = d.desc       || '';
      newShopeeInput= d.shopeeInput|| '';
      newShopeeUrl  = d.shopeeUrl  || '';
      newCaroUrl    = d.caroUrl    || '';
      if (newTitle || newDesc) newShopeeCollapsed = true;
    }
  } catch(e) {}
}

async function syncFromSupabase() {
  try {
    const today = getToday();
    const [pRes, dRes, sRes] = await Promise.all([
      sb.from('app_state').select('data').eq('key', 'carobiz_work_progress').single(),
      sb.from('app_state').select('data').eq('key', 'carobiz_done_data').single(),
      sb.from('app_state').select('data').eq('key', 'carobiz_sales').single()
    ]);

    if (pRes.data?.data) {
      const p = pRes.data.data;
      for (const i of (p.doneIndexes || [])) doneSet.add(i);
      for (const i of (p.deletedIndexes || [])) deletedSet.add(i);
      if ((p.currentIndex || 0) > currentIndex) currentIndex = p.currentIndex;
      if (p.todayDate === today) {
        doneTodayCount = Math.max(doneTodayCount, p.doneTodayCount || 0);
        deletedTodayCount = Math.max(deletedTodayCount, p.deletedTodayCount || 0);
      }
      todayDate = today;
    }

    if (dRes.data?.data) {
      doneData = dRes.data.data;
    }

    if (sRes.data?.data) {
      salesLog = sRes.data.data;
      localStorage.setItem('carobiz_sales', JSON.stringify(salesLog));
    }

    saveLocal();
  } catch (e) {
    console.warn('Supabase sync error:', e);
  }
}

function saveLocal() {
  localStorage.setItem('carobiz_work', JSON.stringify({
    currentIndex,
    doneIndexes: [...doneSet],
    deletedIndexes: [...deletedSet],
    doneData,
    doneTodayCount,
    deletedTodayCount,
    todayDate
  }));
}

async function pushToSupabase() {
  const now = new Date().toISOString();
  const today = getToday();
  setSyncStatus('syncing');
  Promise.all([
    sb.from('app_state').upsert({ key: 'carobiz_work_progress', data: {
      currentIndex,
      doneIndexes: [...doneSet],
      deletedIndexes: [...deletedSet],
      doneTodayCount,
      deletedTodayCount,
      todayDate: today
    }, updated_at: now }),
    sb.from('app_state').upsert({ key: 'carobiz_done_data', data: doneData, updated_at: now }),
    sb.from('app_state').upsert({ key: 'carobiz_sales', data: salesLog, updated_at: now })
  ]).then(() => setSyncStatus('synced')).catch(e => { console.warn('Supabase push error:', e); setSyncStatus('error'); });
}

let syncStatusTimer = null;
function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  clearTimeout(syncStatusTimer);
  el.className = 'sync-status visible ' + state;
  if (state === 'syncing') {
    el.textContent = '⟳ Syncing…';
  } else if (state === 'synced') {
    el.textContent = '✓ Synced';
    syncStatusTimer = setTimeout(() => { el.className = 'sync-status'; }, 3000);
  } else if (state === 'error') {
    el.textContent = '✗ Sync failed';
    syncStatusTimer = setTimeout(() => { el.className = 'sync-status'; }, 5000);
  }
}

// Queue
function findNext(from) {
  let i = from;
  while (i < LISTINGS.length && (doneSet.has(i) || deletedSet.has(i))) i++;
  return i;
}

function markDone() {
  const idx = currentIndex;
  if (!doneSet.has(idx) && !deletedSet.has(idx)) {
    const L = LISTINGS[idx];
    doneSet.add(idx);
    doneTodayCount++;
    doneData.push({
      index: idx,
      title: aiTitle || L[0],
      description: aiDesc,
      shopeeUrl: L[1],
      carousellUrl: L[2],
      sourceCost: editedCost !== null ? editedCost : L[3],
      sellPrice: calcSell(editedCost !== null ? editedCost : L[3]),
      doneAt: new Date().toISOString()
    });
  }
  resetAI();
  currentIndex = findNext(idx + 1);
  saveLocal();
  pushToSupabase();
  renderAll();
  toast('Done ✓');
}

function markDeleted() {
  const idx = currentIndex;
  if (!doneSet.has(idx) && !deletedSet.has(idx)) {
    deletedSet.add(idx);
    deletedTodayCount++;
  }
  resetAI();
  currentIndex = findNext(idx + 1);
  saveLocal();
  renderAll();
  // Hold Supabase push for 4s so user can undo
  pendingDeleteUndo = { idx };
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { pendingDeleteUndo = null; pushToSupabase(); }, 4000);
  toastWithUndo('Deleted', undoDelete);
}

function undoDelete() {
  if (!pendingDeleteUndo) return;
  const { idx } = pendingDeleteUndo;
  pendingDeleteUndo = null;
  clearTimeout(undoTimer);
  deletedSet.delete(idx);
  deletedTodayCount = Math.max(0, deletedTodayCount - 1);
  currentIndex = idx;
  saveLocal();
  renderAll();
  toast('Undo ✓');
}

function saveDoneLinkEdits(doneIdx, listingIndex) {
  const s = document.getElementById(`done-link-shopee-${doneIdx}`)?.value.trim() || '';
  const c = document.getElementById(`done-link-caro-${doneIdx}`)?.value.trim() || '';
  urlOverrides[listingIndex] = { shopeeUrl: s, carousellUrl: c };
  localStorage.setItem('carobiz_url_overrides', JSON.stringify(urlOverrides));
  doneLinkEditIdx = null;
  renderDoneView();
  toast('Links saved');
}

function saveLinkEdits() {
  const s = document.getElementById('link-shopee-input')?.value.trim() || '';
  const c = document.getElementById('link-caro-input')?.value.trim() || '';
  urlOverrides[currentIndex] = { shopeeUrl: s, carousellUrl: c };
  localStorage.setItem('carobiz_url_overrides', JSON.stringify(urlOverrides));
  linkEditing = false;
  renderFixView();
  toast('Links saved');
}

function resetAI() {
  aiLoading = false;
  aiTitle = '';
  aiDesc = '';
  editedCost = null;
  shopeeInput = '';
  linkEditing = false;
  shopeeCollapsed = false;
  fixShopeeImages = [];
  fixShopeeFetching = false;
  fixFetchCollapsed = false;
}

// AI — shared constants & helpers
const TITLE_SYSTEM = `You are a Carousell Singapore SEO copywriter.

TASK: Write a Carousell listing title for the product below. Output the title text only — no JSON, no explanation, no quotes, nothing else.

RULES:
1. Length: exactly 200–225 characters. Count every character. This is the strictest rule.
2. Format: pipe-separated segments using Title Case. Each segment follows the pattern [Relevant Feature(s)] + [Item Name]. Example: "RGB Mechanical Gaming Keyboard | Fast Response Gaming Keyboard | Anti Ghosting Pro Keyboard"
3. The item name (or a close synonym) must appear in most segments — this is what drives search ranking.
4. Each segment must be a complete phrase that a real buyer could type into the search bar.
5. Front-load the strongest buyer search terms in the first 50 characters.
6. Segments are 3–6 words. Never a single word alone.
7. Correct any spelling errors in the source text — do not copy typos.
8. Never use: brand names, model numbers or SKUs, platform names (Shopee, Carousell, Lazada, Amazon), seller phrases ("Local Seller", "SG Seller", "Fast Delivery"), !, @, #, $, %, *, &, emojis, "Brand New", "Free Shipping", "nice", "cheap", "best".

CORRECT EXAMPLE (214 chars):
Foldable Deck Chair Recliner With Headrest | Breathable Mesh Lounge Chair For Home Outdoor | Portable Folding Reclining Chair With X-Frame Support | Lightweight Camping Beach Chair 150KG Load | Space-Saving Folding Lazy Chair With Neck Pillow

WRONG EXAMPLE:
Wireless RGB Keyboard — sentence structure, forbidden

Before outputting, silently count the characters. If under 200 or over 225, rewrite. Output only the final title — no counting, no explanation, nothing else.`;

const DESC_SYSTEM = `You are a Carousell Singapore listing copywriter. Output ONLY a JSON object with one key: {"description":"..."}

Plain text only inside the JSON — no **bold**, no #headers, no markdown.

Use exactly this structure:

🚚 FREE Local Delivery | 1-3 Working Days

[One hook sentence: what this product is + 2–3 standout features + key use cases]

✅ [Feature] — [what it means for the buyer]
✅ [Feature] — [what it means for the buyer]
(write 8–12 bullets covering: key features, build quality, convenience, use cases, dimensions or capacity if known)

💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂

RULES:
- CRITICAL: '🚚 FREE Local Delivery | 1-3 Working Days' must be the very first line — nothing before it
- CRITICAL: '💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂' must be the very last line — nothing after it
- No brand names, no platform names (Shopee, Lazada, Amazon)
- No vague words: "high quality", "amazing", "best", "incredible"
- Each bullet: feature on the left of —, buyer benefit on the right
- Cover use cases (home, office, outdoor etc.) as bullets where relevant
- Include measurements, weight or capacity as a bullet if the info is available
- Keep total length moderate — this is a fast-moving dropshipping store`;


function normalizeDesc(text) {
  if (!text) return text;
  const DELIVERY = '🚚 FREE Local Delivery | 1-3 Working Days';
  const PAYMENT  = '💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂';
  let lines = text.split('\n');

  // Delivery line must be first
  if (!lines[0].trim().startsWith('🚚')) {
    const idx = lines.findIndex(l => l.includes('🚚') || l.includes('FREE Local Delivery'));
    if (idx > 0) {
      const [found] = lines.splice(idx, 1);
      while (lines.length && !lines[0].trim()) lines.shift();
      lines = [found.trim(), '', ...lines];
    } else if (idx === -1) {
      lines = [DELIVERY, '', ...lines];
    }
  }

  // Payment line must be last
  const lastNonEmptyIdx = [...lines].map((l, i) => l.trim() ? i : -1).filter(i => i !== -1).pop();
  if (lastNonEmptyIdx === undefined || lines[lastNonEmptyIdx].trim() !== PAYMENT) {
    const idx = lines.findIndex(l => l.includes('💳') || l.includes('PayNow'));
    if (idx !== -1) lines.splice(idx, 1);
    while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
    lines.push('', PAYMENT);
  }

  return lines.join('\n');
}

function updateCharCount(val, id) {
  const el = document.getElementById(id);
  if (!el) return;
  const len = val.length;
  el.textContent = len + ' / 225';
  el.className = 'char-counter' + (len > 225 ? ' danger' : len >= 200 ? ' warn' : '');
}


function saveDraft() {
  if (newTitle || newDesc || newShopeeInput) {
    localStorage.setItem('carobiz_new_draft', JSON.stringify({
      title: newTitle, desc: newDesc, shopeeInput: newShopeeInput,
      shopeeUrl: newShopeeUrl, caroUrl: newCaroUrl
    }));
  } else {
    localStorage.removeItem('carobiz_new_draft');
  }
}


async function callClaude(apiKey, system, userContent, maxTokens, retries = 2) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    let resp, data;
    try {
      resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
          'content-type': 'application/json'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: maxTokens,
          temperature: 0.3,
          system,
          messages: [{ role: 'user', content: userContent }]
        })
      });
      data = await resp.json();
    } catch (e) {
      // Network / parse error — retry with backoff
      if (attempt < retries) {
        await new Promise(r => setTimeout(r, 2000 * (attempt + 1)));
        continue;
      }
      throw e;
    }
    if (data.error) {
      const isOverload = data.error.type === 'overloaded_error' || resp.status === 529;
      if (isOverload && attempt < retries) {
        await new Promise(r => setTimeout(r, 3000));
        continue;
      }
      throw new Error(data.error.message);
    }
    return data.content?.[0]?.text || '';
  }
}

async function runAIGenerate(productText, { titleOnly = false, descOnly = false } = {}) {
  const apiKey = localStorage.getItem('alfred_claude_key');
  if (!apiKey) throw new Error('NO_KEY');
  const productContent = `Product info:\n\n${productText}`;
  const titlePromise = descOnly  ? null : callClaude(apiKey, TITLE_SYSTEM, productContent, 512);
  const descPromise  = titleOnly ? null : callClaude(apiKey, DESC_SYSTEM, productContent, 1536);
  let rawTitle = '';
  if (!descOnly) {
    let titleText = await titlePromise;
    rawTitle = titleText.trim().split('\n')[0].trim();
    if (rawTitle.length < 200) {
      const retry = await callClaude(apiKey, TITLE_SYSTEM, productContent + '\n\nIMPORTANT: Previous attempt was too short. You MUST reach at least 200 characters. Add more keyword segments.', 512);
      rawTitle = retry.trim().split('\n')[0].trim();
    }
    if (rawTitle.length > 225) {
      const parts = rawTitle.split(' | ');
      while (parts.length > 1 && parts.join(' | ').length > 225) parts.pop();
      rawTitle = parts.join(' | ');
    }
  }
  if (titleOnly) return { title: rawTitle, desc: '' };
  const descText = await descPromise;
  const descMatch = descText.match(/\{[\s\S]*\}/);
  const desc = normalizeDesc(descMatch ? (JSON.parse(descMatch[0]).description || '') : '');
  return { title: rawTitle, desc };
}

// FIX tab AI
async function generateAI(mode = 'both') {
  const apiKey = localStorage.getItem('alfred_claude_key');
  if (!apiKey) { apiKeyVisible = true; renderFixView(); return; }
  const taEl = document.getElementById('shopee-input-ta');
  if (taEl) shopeeInput = taEl.value;
  if (!shopeeInput.trim()) { toast('Fetch or paste Shopee content first'); return; }
  aiLoading = true;
  renderFixView();
  let aiError = null;
  try {
    const { title, desc } = await runAIGenerate(shopeeInput, {
      titleOnly: mode === 'title',
      descOnly:  mode === 'desc',
    });
    if (mode !== 'desc'  && title) aiTitle = title;
    if (mode !== 'title' && desc)  aiDesc  = desc;
    if (!aiTitle && !aiDesc) aiError = 'No content returned — try again';
  } catch (e) {
    if (e.message === 'NO_KEY') { apiKeyVisible = true; aiLoading = false; renderFixView(); return; }
    aiError = e.message || 'Unknown error';
  }
  if (aiTitle || aiDesc) { shopeeCollapsed = true; fixFetchCollapsed = true; }
  aiLoading = false;
  renderFixView();
  if (aiError) {
    const errEl = document.createElement('div');
    errEl.style.cssText = 'background:#c0392b;color:#fff;padding:10px 14px;border-radius:8px;margin:8px 0;font-size:13px;word-break:break-all';
    errEl.textContent = 'Error: ' + aiError;
    const aiSection = document.querySelector('.ai-section');
    if (aiSection) aiSection.prepend(errEl);
  }
}

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();

    localStorage.setItem('alfred_claude_key', val);
    apiKeyVisible = false;

}

// NEW tab — fetch from Shopee URL
async function fetchShopeeData() {
  const urlEl = document.getElementById('new-shopee-fetch-url');

// FIX tab — fetch from Shopee URL
async function fetchShopeeDataFix() {
  const urlEl = document.getElementById('fix-shopee-fetch-url');

    const res  = await fetch(`/api/shopee?url=${encodeURIComponent(url)}`);

// NEW tab AI
async function generateAINew(mode = 'both') {
  const apiKey = localStorage.getItem('alfred_claude_key');
  if (!apiKey) { newApiKeyVisible = true; renderNewView(); return; }
  const taEl = document.getElementById('new-shopee-ta');
  if (taEl) newShopeeInput = taEl.value;
  if (!newShopeeInput.trim()) { toast('Fetch or paste Shopee content first'); return; }
  newLoading = true;
  renderNewView();
  let aiError = null;
  try {
    const { title, desc } = await runAIGenerate(newShopeeInput, {
      titleOnly: mode === 'title',
      descOnly:  mode === 'desc',
    });
    if (mode !== 'desc'  && title) newTitle = title;
    if (mode !== 'title' && desc)  newDesc  = desc;
    if (!newTitle && !newDesc) aiError = 'No content returned — try again';
  } catch (e) {
    if (e.message === 'NO_KEY') { newApiKeyVisible = true; newLoading = false; renderNewView(); return; }
    aiError = e.message || 'Unknown error';
  }
  if (newTitle || newDesc) { newShopeeCollapsed = true; newFetchCollapsed = true; }
  newLoading = false;
  saveDraft();
  renderNewView();
  if (aiError) {
    const errEl = document.createElement('div');
    errEl.style.cssText = 'background:#c0392b;color:#fff;padding:10px 14px;border-radius:8px;margin:8px 0;font-size:13px;word-break:break-all';
    errEl.textContent = 'Error: ' + aiError;
    document.getElementById('new-wrap')?.prepend(errEl);
  }
}

function searchListings(query) {
  const dropdown = document.getElementById('search-dropdown');
  if (!query.trim()) { dropdown.style.display = 'none'; return; }
  const q = query.toLowerCase();
  const matches = [];
  for (let i = 0; i < LISTINGS.length && matches.length < 6; i++) {
    if (LISTINGS[i][0].toLowerCase().includes(q)) matches.push({ L: LISTINGS[i], i });
  }
  if (matches.length === 0) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = matches.map(({ L, i }) => {
    const shopeeLink = L[1] ? `<a class="search-result-link" href="${esc(L[1])}" target="_blank" rel="noopener" onmousedown="event.stopPropagation()">Shopee ↗</a>` : '';
    const caroLink  = L[2] ? `<a class="search-result-link" href="${esc(L[2])}" target="_blank" rel="noopener" onmousedown="event.stopPropagation()">Carousell ↗</a>` : '';
    const isDone = doneSet.has(i) || deletedSet.has(i);
    const fixBtn = !isDone ? `<span class="search-result-link" style="cursor:pointer" onmousedown="event.stopPropagation();jumpToFix(${i})">Go to Fix →</span>` : '';
    return `<div class="search-result" onmousedown="selectListing(${i})">
      <div class="search-result-name">${esc(L[0])}</div>
      <div class="search-result-meta">
        <span class="search-result-price">Sell $${L[4]}</span>
        ${shopeeLink}${caroLink}${fixBtn}
      </div>
    </div>`;
  }).join('');
  dropdown.style.display = 'block';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';

function addSwipeGestures() {
  const card = document.querySelector('#listing-wrap .listing-card');
  if (!card) return;
  let startX = 0, startY = 0, swiping = false;
  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
  }, { passive: true });
  card.addEventListener('touchmove', e => {
    if (!swiping) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dy) > Math.abs(dx)) swiping = false; // cancel if mostly vertical
  }, { passive: true });
  card.addEventListener('touchend', e => {
    if (!swiping) return;
    swiping = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.7) return;
    if (dx > 0) markDone(); else markDeleted();
  }, { passive: true });
}

function renderDoneView() {
  const query = (document.getElementById('done-search')?.value || '').toLowerCase();
  const list = document.getElementById('done-list');
  const filtered = doneData.map((d, i) => ({ ...d, _i: i }))
    .filter(d => !query || d.title.toLowerCase().includes(query));

  if (filtered.length === 0) {
    list.innerHTML = `<p class="done-empty">${doneData.length === 0 ? 'No done listings yet' : 'No matches'}</p>`;
    return;
  }

  list.innerHTML = filtered.map(d => {
    const ov = urlOverrides[d.index] || {};
    const dShopee = ov.shopeeUrl !== undefined ? ov.shopeeUrl : (d.shopeeUrl || LISTINGS[d.index]?.[1] || '');
    const dCaro = ov.carousellUrl !== undefined ? ov.carousellUrl : (d.carousellUrl || LISTINGS[d.index]?.[2] || '');
    const linkBtns = `<div style="display:flex;gap:6px;margin-top:6px">
      ${dShopee ? `<a class="link-btn" href="${esc(dShopee)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Shopee ↗</a>` : ''}
      ${dCaro ? `<a class="link-btn" href="${esc(dCaro)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Carousell ↗</a>` : ''}
    </div>`;
    if (editingDoneIdx === d._i) {
      const linkSection = doneLinkEditIdx === d._i ? `
        <div class="done-link-inputs">
          <input class="link-edit-input" id="done-link-shopee-${d._i}" type="url" placeholder="Shopee URL" value="${esc(dShopee)}">
          <input class="link-edit-input" id="done-link-caro-${d._i}" type="url" placeholder="Carousell URL" value="${esc(dCaro)}">
          <button class="done-save-btn" onclick="saveDoneLinkEdits(${d._i},${d.index})">Save Links</button>
        </div>` : linkBtns;
      return `<div class="done-entry editing">
        <input class="done-edit-title" type="text" value="${esc(d.title)}" id="edit-title-${d._i}" placeholder="Title">
        <div class="done-edit-price">
          <span style="font-size:13px;color:var(--text-tertiary)">Cost $</span>
          <input class="done-edit-cost" type="number" step="0.01" value="${d.sourceCost}" id="edit-cost-${d._i}" oninput="updateDoneEditSell(${d._i},this.value)">
          <span style="color:var(--text-tertiary)">→</span>
          <span class="done-edit-sell" id="edit-sell-${d._i}">$${parseFloat(d.sellPrice).toFixed(2)}</span>
        </div>
        ${linkSection}
        <div class="done-edit-actions">
          <button class="done-cancel-btn" onclick="editingDoneIdx=null;doneLinkEditIdx=null;renderDoneView()">Cancel</button>
          <button class="done-link-btn" onclick="doneLinkEditIdx=${doneLinkEditIdx===d._i ? 'null' : d._i};renderDoneView()">✎ Links</button>
          <button class="done-save-btn" onclick="saveDoneEdit(${d._i})">Save</button>
        </div>
        <button class="done-cancel-btn" style="width:100%;margin-top:6px;color:#c0392b;border-color:rgba(192,57,43,0.3)" onclick="deleteDoneEntry(${d._i},${d.index})">Delete listing</button>
      </div>`;
    }
    return `<div class="done-entry" onclick="editingDoneIdx=${d._i};renderDoneView()">
      <div class="done-info">
        <div class="done-title-text">${esc(d.title)}</div>
        <div class="done-meta">Cost $${d.sourceCost} → Sell $${parseFloat(d.sellPrice).toFixed(2)}</div>
        ${linkBtns}
      </div>
      <div class="done-edit-icon">✎</div>
    </div>`;
  }).join('');
}


function updateDoneEditSell(i, val) {
  const el = document.getElementById(`edit-sell-${i}`);
  if (el) el.textContent = '$' + calcSell(parseFloat(val) || 0).toFixed(2);
}

function saveDoneEdit(i) {
  const title = document.getElementById(`edit-title-${i}`)?.value?.trim();
  const cost = parseFloat(document.getElementById(`edit-cost-${i}`)?.value) || 0;
  if (!title) { toast('Title cannot be empty'); return; }
  doneData[i].title = title;
  doneData[i].sourceCost = cost;
  doneData[i].sellPrice = calcSell(cost);
  editingDoneIdx = null;
  saveLocal();
  pushToSupabase();
  renderDoneView();
  toast('Saved');
}

function deleteDoneEntry(i, listingIndex) {
  if (!confirm('Remove this listing from Done? This also removes it from your processed count.')) return;
  doneData.splice(i, 1);
  doneSet.delete(listingIndex);
  editingDoneIdx = null;
  doneLinkEditIdx = null;
  saveLocal();
  pushToSupabase();
  renderDoneView();
  renderFixView();
  toast('Listing removed');
}

function copyField(fieldId, btnId) {
  const el = document.getElementById(fieldId);
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(() => {
    const btn = document.getElementById(btnId);
    if (btn) {
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      clearTimeout(copyTimers[btnId]);
      copyTimers[btnId] = setTimeout(() => {
        const b = document.getElementById(btnId);
        if (b) { b.textContent = 'Copy'; b.classList.remove('copied'); }
        delete copyTimers[btnId];
      }, 1500);
    }
  });
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

let _undoFn = null;
function toastWithUndo(msg, undoFn) {
  _undoFn = undoFn;
  const el = document.getElementById('toast');
  el.innerHTML = esc(msg) + '  <button onclick="_undoFn&&_undoFn()" style="background:none;border:none;color:var(--coral);font-size:12px;font-weight:700;cursor:pointer;padding:0;letter-spacing:0.06em">UNDO</button>';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('show'); _undoFn = null; }, 4000);
}

// Keyboard shortcuts for FIX tab (desktop)
document.addEventListener('keydown', e => {
  if (activeTab !== 'fix') return;
  if (e.target.matches('input, textarea, select')) return;
  if (currentIndex >= LISTINGS.length) return;
  if (e.key === 'd' || e.key === 'D') { e.preventDefault(); markDone(); }
  if (e.key === 'x' || e.key === 'X' || e.key === 'Delete') { e.preventDefault(); markDeleted(); }
});

init();
</script>
