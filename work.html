<script>
function calcSell(cost) {
  const c = parseFloat(cost) || 0;
  return Math.ceil(Math.max(c * 1.5, c + 24) / 5) * 5 - 0.1;
}

function onCostChange(val) {
  editedCost = parseFloat(val) || 0;
  const el = document.getElementById('sell-display');
  if (el) el.textContent = '$' + calcSell(editedCost).toFixed(2);
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Returns today's date string YYYY-MM-DD (recomputed each call so midnight rollovers work)
function getToday() { return new Date().toISOString().slice(0, 10); }

// Listings (loaded from Supabase)
let LISTINGS = [];      // [[title, shopeeUrl, carousellUrl, sourceCost, sellPrice], ...]
let LISTING_IDS = [];   // [supabase_id, ...] parallel array

// State
let currentIndex = 0;
let doneSet = new Set();
let deletedSet = new Set();
let doneData = [];
let doneTodayCount = 0;
let deletedTodayCount = 0;
let todayDate = getToday();
let salesLog = [];
let activeTab = 'fix';
let editingDoneIdx = null;

// AI state
let aiExpanded = false;
let aiLoading = false;
let aiTitle = '';
let aiDesc = '';
let editedCost = null;
let shopeeInput = '';
let shopeeCollapsed = false;
let apiKeyVisible = false;
let fixShopeeImages = [];
let fixShopeeFetching = false;
let fixFetchCollapsed = false;

// Undo / copy state
let undoTimer = null;
let undoStack = [];
const copyTimers = {};

// API key (lifted out of render to avoid repeated localStorage reads)
let savedApiKey = localStorage.getItem('alfred_claude_key') || '';

// NEW tab state
let newTitle = '';
let newDesc = '';
let newShopeeInput = '';
let newCost = '';
let newShopeeUrl = '';
let newCaroUrl = '';
let newLoading = false;
let newShopeeCollapsed = false;
let newShopeeImages = [];
let newShopeeFetching = false;
let newApiKeyVisible = false;
let newFetchCollapsed = false;

// Link overrides
let linkEditing = false;
let doneLinkEditIdx = null;
let urlOverrides = {};

// Init
async function init() {
  loadLocal();
  renderAll();
  await loadListingsFromSupabase();
  await syncFromSupabase();
  currentIndex = findNext(currentIndex);
  renderAll();
}

async function loadListingsFromSupabase() {
  try {
    const { data, error } = await sb
      .from('listings')
      .select('id,title,shopee_url,carousell_url,source_cost,sell_price')
      .eq('status', 'active')
      .order('id');
    if (error) throw error;
    LISTINGS    = data.map(r => [r.title, r.shopee_url, r.carousell_url, String(r.source_cost), String(r.sell_price)]);
    LISTING_IDS = data.map(r => r.id);
  } catch (e) {
    console.error('Failed to load listings from Supabase:', e);
  }
}

function loadLocal() {
  const today = getToday();
  // Clear stale localStorage — Supabase is now source of truth for listings state
  localStorage.removeItem('carobiz_work');
  todayDate = today;
  const rawSales = localStorage.getItem('carobiz_sales');
  if (rawSales) salesLog = JSON.parse(rawSales);
  const rawOverrides = localStorage.getItem('carobiz_url_overrides');
  if (rawOverrides) urlOverrides = JSON.parse(rawOverrides);
  // Restore NEW tab draft
  try {
    const rawDraft = localStorage.getItem('carobiz_new_draft');
    if (rawDraft) {
      const d = JSON.parse(rawDraft);
      newTitle      = d.title      || '';
      newDesc       = d.desc       || '';
      newShopeeInput= d.shopeeInput|| '';
      newShopeeUrl  = d.shopeeUrl  || '';
      newCaroUrl    = d.caroUrl    || '';
      if (newTitle || newDesc) newShopeeCollapsed = true;
    }
  } catch(e) {}
}

async function syncFromSupabase() {
  try {
    const [dRes, sRes] = await Promise.all([
      sb.from('app_state').select('data').eq('key', 'carobiz_done_data').single(),
      sb.from('app_state').select('data').eq('key', 'carobiz_sales').single()
    ]);

    if (dRes.data?.data) {
      doneData = dRes.data.data;
      // Rebuild doneSet from doneData indexes
      doneSet = new Set(doneData.filter(d => d.index !== null).map(d => d.index));
      doneTodayCount = doneData.filter(d => d.doneAt?.startsWith(getToday())).length;
    }

    if (sRes.data?.data) {
      salesLog = sRes.data.data;
      localStorage.setItem('carobiz_sales', JSON.stringify(salesLog));
    }
  } catch (e) {
    console.warn('Supabase sync error:', e);
  }
}

function saveLocal() {
  localStorage.setItem('carobiz_work', JSON.stringify({
    todayDate
  }));
}

async function pushToSupabase() {
  const now = new Date().toISOString();
  const today = getToday();
  setSyncStatus('syncing');
  await Promise.all([
    sb.from('app_state').upsert({ key: 'carobiz_done_data', data: doneData, updated_at: now }),
    sb.from('app_state').upsert({ key: 'carobiz_sales', data: salesLog, updated_at: now })
  ]).then(() => setSyncStatus('synced')).catch(e => { console.warn('Supabase push error:', e); setSyncStatus('error'); });
}

let syncStatusTimer = null;
function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  clearTimeout(syncStatusTimer);
  el.className = 'sync-status visible ' + state;
  if (state === 'syncing') {
    el.textContent = '⟳ Syncing…';
  } else if (state === 'synced') {
    el.textContent = '✓ Synced';
    syncStatusTimer = setTimeout(() => { el.className = 'sync-status'; }, 3000);
  } else if (state === 'error') {
    el.textContent = '✗ Sync failed';
    syncStatusTimer = setTimeout(() => { el.className = 'sync-status'; }, 5000);
  }
}

// Queue
function findNext(from) {
  let i = from;
  while (i < LISTINGS.length && (doneSet.has(i) || deletedSet.has(i))) i++;
  return i;
}

function markDone() {
  const idx = currentIndex;
  const costVal = editedCost !== null ? editedCost : LISTINGS[idx][3];
  if (!costVal || costVal <= 0) { toast('Enter a cost before marking Done'); return; }
  if (!doneSet.has(idx) && !deletedSet.has(idx)) {
    const L = LISTINGS[idx];
    const sbId = LISTING_IDS[idx];
    doneSet.add(idx);
    doneTodayCount++;
    doneData.push({
      index: idx,
      title: aiTitle || L[0],
      description: aiDesc,
      shopeeUrl: L[1],
      carousellUrl: L[2],
      sourceCost: editedCost !== null ? editedCost : L[3],
      sellPrice: calcSell(editedCost !== null ? editedCost : L[3]),
      doneAt: new Date().toISOString()
    });
    // Mark as done in Supabase
    if (sbId) sb.from('listings').update({ status: 'done' }).eq('id', sbId).then(() => {});
  }
  resetAI();
  currentIndex = findNext(idx + 1);
  saveLocal();
  pushToSupabase();
  renderAll();
  toast('Done ✓');
}

function markDeleted() {
  const idx = currentIndex;
  if (!doneSet.has(idx) && !deletedSet.has(idx)) {
    deletedSet.add(idx);
    deletedTodayCount++;
    undoStack.push({ idx, sbId: LISTING_IDS[idx] });
  }
  resetAI();
  currentIndex = findNext(idx + 1);
  saveLocal();
  renderAll();
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    // Hard delete from Supabase after undo window
    for (const { sbId } of undoStack) {
      if (sbId) sb.from('listings').delete().eq('id', sbId).then(() => {});
    }
    undoStack = [];
    pushToSupabase();
  }, 4000);
  toastWithUndo('Deleted', undoDelete);
}

function undoDelete() {
  const entry = undoStack.pop();
  if (entry === undefined) return;
  const idx = entry.idx ?? entry; // handle old format
  deletedSet.delete(idx);
  deletedTodayCount = Math.max(0, deletedTodayCount - 1);
  currentIndex = idx;
  clearTimeout(undoTimer);
  if (undoStack.length > 0) {
    undoTimer = setTimeout(() => {
      for (const { sbId } of undoStack) {
        if (sbId) sb.from('listings').delete().eq('id', sbId).then(() => {});
      }
      undoStack = [];
      pushToSupabase();
    }, 4000);
  }
  saveLocal();
  renderAll();
  const remaining = undoStack.length;
  toast(remaining > 0 ? `Undo ✓ (${remaining} pending)` : 'Undo ✓');
}

function saveDoneLinkEdits(doneIdx, listingIndex) {
  const s = document.getElementById(`done-link-shopee-${doneIdx}`)?.value.trim() || '';
  const c = document.getElementById(`done-link-caro-${doneIdx}`)?.value.trim() || '';
  urlOverrides[listingIndex] = { shopeeUrl: s, carousellUrl: c };
  localStorage.setItem('carobiz_url_overrides', JSON.stringify(urlOverrides));
  doneLinkEditIdx = null;
  renderDoneView();
  toast('Links saved');
}

function saveLinkEdits() {
  const s = document.getElementById('link-shopee-input')?.value.trim() || '';
  const c = document.getElementById('link-caro-input')?.value.trim() || '';
  urlOverrides[currentIndex] = { shopeeUrl: s, carousellUrl: c };
  localStorage.setItem('carobiz_url_overrides', JSON.stringify(urlOverrides));
  linkEditing = false;
  renderFixView();
  toast('Links saved');
}

function resetAI() {
  aiLoading = false;
  aiTitle = '';
  aiDesc = '';
  editedCost = null;
  shopeeInput = '';
  linkEditing = false;
  shopeeCollapsed = false;
  fixShopeeImages = [];
  fixShopeeFetching = false;
  fixFetchCollapsed = false;
}

// AI — shared constants & helpers
const TITLE_SYSTEM = `You are a Carousell Singapore SEO copywriter.

TASK: Write a Carousell listing title for the product below. Output the title text only — no JSON, no explanation, no quotes, nothing else.

RULES:
1. Length: exactly 200–225 characters. Count every character. This is the strictest rule.
2. Format: pipe-separated segments using Title Case. Each segment follows the pattern [Relevant Feature(s)] + [Item Name]. Example: "RGB Mechanical Gaming Keyboard | Fast Response Gaming Keyboard | Anti Ghosting Pro Keyboard"
3. The item name (or a close synonym) must appear in most segments — this is what drives search ranking.
4. Each segment must be a complete phrase that a real buyer could type into the search bar.
5. Front-load the strongest buyer search terms in the first 50 characters.
6. Segments are 3–6 words. Never a single word alone.
7. Correct any spelling errors in the source text — do not copy typos.
8. Never use: brand names, model numbers or SKUs, platform names (Shopee, Carousell, Lazada, Amazon), seller phrases ("Local Seller", "SG Seller", "Fast Delivery"), !, @, #, $, %, *, &, emojis, "Brand New", "Free Shipping", "nice", "cheap", "best".

CORRECT EXAMPLE (214 chars):
Foldable Deck Chair Recliner With Headrest | Breathable Mesh Lounge Chair For Home Outdoor | Portable Folding Reclining Chair With X-Frame Support | Lightweight Camping Beach Chair 150KG Load | Space-Saving Folding Lazy Chair With Neck Pillow

WRONG EXAMPLE:
Wireless RGB Keyboard — sentence structure, forbidden

Before outputting, silently count the characters. If under 200 or over 225, rewrite. Output only the final title — no counting, no explanation, nothing else.`;

const DESC_SYSTEM = `You are a Carousell Singapore listing copywriter. Output ONLY a JSON object with one key: {"description":"..."}

Plain text only inside the JSON — no **bold**, no #headers, no markdown.

Use exactly this structure:

🚚 FREE Local Delivery | 1-3 Working Days

[One hook sentence: what this product is + 2–3 standout features + key use cases]

✅ [Feature] — [what it means for the buyer]
✅ [Feature] — [what it means for the buyer]
(write 8–12 bullets covering: key features, build quality, convenience, use cases, dimensions or capacity if known)

💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂

RULES:
- CRITICAL: '🚚 FREE Local Delivery | 1-3 Working Days' must be the very first line — nothing before it
- CRITICAL: '💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂' must be the very last line — nothing after it
- No brand names, no platform names (Shopee, Lazada, Amazon)
- No vague words: "high quality", "amazing", "best", "incredible"
- Each bullet: feature on the left of —, buyer benefit on the right
- Cover use cases (home, office, outdoor etc.) as bullets where relevant
- Include measurements, weight or capacity as a bullet if the info is available
- Keep total length moderate — this is a fast-moving dropshipping store`;


function normalizeDesc(text) {
  if (!text) return text;
  const DELIVERY = '🚚 FREE Local Delivery | 1-3 Working Days';
  const PAYMENT  = '💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂';
  let lines = text.split('\n');

  // Delivery line must be first
  if (!lines[0].trim().startsWith('🚚')) {
    const idx = lines.findIndex(l => l.includes('🚚') || l.includes('FREE Local Delivery'));
    if (idx > 0) {
      const [found] = lines.splice(idx, 1);
      while (lines.length && !lines[0].trim()) lines.shift();
      lines = [found.trim(), '', ...lines];
    } else if (idx === -1) {
      lines = [DELIVERY, '', ...lines];
    }
  }

  // Payment line must be last
  const lastNonEmptyIdx = [...lines].map((l, i) => l.trim() ? i : -1).filter(i => i !== -1).pop();
  const hasPaymentAtEnd = lastNonEmptyIdx !== undefined && lines[lastNonEmptyIdx].trim() === PAYMENT;
  if (!hasPaymentAtEnd) {
    const idx = lines.findIndex(l => l.includes('💳') || l.includes('PayNow'));
    if (idx !== -1) lines.splice(idx, 1);
    while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
    lines.push('', PAYMENT);
  }

  return lines.join('\n');
}

function updateCharCount(val, id) {
  const el = document.getElementById(id);
  if (!el) return;
  const len = val.length;
  el.textContent = len + ' / 225';
  el.className = 'char-counter' + (len > 225 ? ' danger' : len >= 200 ? ' warn' : '');
}


function saveDraft() {
  if (newTitle || newDesc || newShopeeInput) {
    localStorage.setItem('carobiz_new_draft', JSON.stringify({
      title: newTitle, desc: newDesc, shopeeInput: newShopeeInput,
      shopeeUrl: newShopeeUrl, caroUrl: newCaroUrl
    }));
  } else {
    localStorage.removeItem('carobiz_new_draft');
  }
}


// Routes through /api/claude so the Anthropic key never touches the browser.
// Falls back to a direct browser call if the server key isn't configured
// (backwards-compatible for local dev with a saved key).
async function callClaude(_unusedKey, system, userContent, maxTokens, retries = 2) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    let resp, data;
    try {
      resp = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ system, userContent, maxTokens, temperature: 0.3 })
      });
      data = await resp.json();
    } catch (e) {
      if (attempt < retries) {
        await new Promise(r => setTimeout(r, 2000 * (attempt + 1)));
        continue;
      }
      throw e;
    }
    if (data.error) {
      // Server says key not configured — fall back to direct browser call
      if (resp.status === 500 && data.error.includes('not configured')) {
        const apiKey = savedApiKey;
        if (!apiKey) throw new Error('NO_KEY');
        const directResp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
            'content-type': 'application/json'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: maxTokens,
            temperature: 0.3,
            system,
            messages: [{ role: 'user', content: userContent }]
          })
        });
        const directData = await directResp.json();
        if (directData.error) throw new Error(directData.error.message);
        return directData.content?.[0]?.text || '';
      }
      const isOverload = resp.status === 529;
      if (isOverload && attempt < retries) {
        await new Promise(r => setTimeout(r, 3000));
        continue;
      }
      throw new Error(data.error);
    }
    return data.text || '';
  }
}

async function runAIGenerate(productText, { titleOnly = false, descOnly = false } = {}) {
  // Key param kept for fallback path inside callClaude — server route doesn't need it
  const apiKey = savedApiKey;
  const productContent = `Product info:\n\n${productText}`;
  const titlePromise = descOnly  ? null : callClaude(apiKey, TITLE_SYSTEM, productContent, 512);
  const descPromise  = titleOnly ? null : callClaude(apiKey, DESC_SYSTEM, productContent, 1536);
  let rawTitle = '';
  if (!descOnly) {
    let titleText = await titlePromise;
    rawTitle = titleText.trim().split('\n')[0].trim();
    if (rawTitle.length < 200) {
      const retry = await callClaude(apiKey, TITLE_SYSTEM, productContent + '\n\nIMPORTANT: Previous attempt was too short. You MUST reach at least 200 characters. Add more keyword segments.', 512);
      rawTitle = retry.trim().split('\n')[0].trim();
    }
    if (rawTitle.length > 225) {
      const parts = rawTitle.split(' | ');
      while (parts.length > 1 && parts.join(' | ').length > 225) parts.pop();
      rawTitle = parts.join(' | ');
    }
  }
  if (titleOnly) return { title: rawTitle, desc: '' };
  const descText = await descPromise;
  const descMatch = descText.match(/\{[\s\S]*\}/);
  let desc = '';
  if (descMatch) {
    try {
      desc = normalizeDesc(JSON.parse(descMatch[0]).description || '');
    } catch {
      // Claude returned malformed JSON — strip wrapper and use raw text
      const raw = descText.replace(/^\s*\{[^"]*"description"\s*:\s*"/, '').replace(/"\s*\}\s*$/, '');
      desc = normalizeDesc(raw);
      if (!desc) throw new Error('AI returned malformed JSON — try again');
    }
  }
  return { title: rawTitle, desc };
}

// Extension bridge — send a postMessage and wait for the reply
function fetchViaExtension(url) {
  return new Promise((resolve, reject) => {
    const reqId = Math.random().toString(36).slice(2);
    const timeout = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Extension timeout'));
    }, 35000);
    function handler(e) {
      if (e.data?.type === 'SM_RESULT' && e.data?.reqId === reqId) {
        clearTimeout(timeout);
        window.removeEventListener('message', handler);
        if (e.data.ok) resolve(e.data.product);
        else reject(new Error(e.data.error || 'Extension error'));
      }
    }
    window.addEventListener('message', handler);
    window.postMessage({ type: 'SM_SCRAPE', url, reqId }, '*');
  });
}

// Check if Wormhole extension is installed
function checkExtension() {
  return new Promise(resolve => {
    const t = setTimeout(() => { window.removeEventListener('message', h); resolve(false); }, 500);
    function h(e) { if (e.data?.type === 'SM_PONG') { clearTimeout(t); window.removeEventListener('message', h); resolve(true); } }
    window.addEventListener('message', h);
    window.postMessage({ type: 'SM_PING' }, '*');
  });
}

let _searchMatches = [];

function searchListings(query) {
  const dropdown = document.getElementById('search-dropdown');
  if (!query.trim()) { dropdown.style.display = 'none'; _searchMatches = []; return; }
  const q = query.toLowerCase();
  _searchMatches = [];
  // Search done listings first — uses AI-rewritten titles
  for (const d of doneData) {
    if (_searchMatches.length >= 8) break;
    if (!d.title.toLowerCase().includes(q)) continue;
    const ov = urlOverrides[d.index] || {};
    _searchMatches.push({
      name: d.title,
      price: d.sellPrice,
      shopee: ov.shopeeUrl ?? d.shopeeUrl ?? LISTINGS[d.index]?.[1] ?? '',
      caro:   ov.carousellUrl ?? d.carousellUrl ?? LISTINGS[d.index]?.[2] ?? '',
      listingIdx: d.index
    });
  }
  // Fall back to unprocessed LISTINGS by original title
  for (let i = 0; i < LISTINGS.length && _searchMatches.length < 10; i++) {
    if (doneSet.has(i) || deletedSet.has(i)) continue;
    if (!LISTINGS[i][0].toLowerCase().includes(q)) continue;
    _searchMatches.push({ name: LISTINGS[i][0], price: LISTINGS[i][4], shopee: LISTINGS[i][1], caro: LISTINGS[i][2], listingIdx: i });
  }
  if (_searchMatches.length === 0) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = _searchMatches.map((m, mi) => {
    const shopeeLink = m.shopee ? `<a class="search-result-link" href="${esc(m.shopee)}" target="_blank" rel="noopener" onmousedown="event.stopPropagation()">Shopee ↗</a>` : '';
    const caroLink  = m.caro   ? `<a class="search-result-link" href="${esc(m.caro)}"   target="_blank" rel="noopener" onmousedown="event.stopPropagation()">Carousell ↗</a>` : '';
    const isDone = m.listingIdx === null || doneSet.has(m.listingIdx) || deletedSet.has(m.listingIdx);
    const fixBtn = !isDone ? `<span class="search-result-link" style="cursor:pointer" onmousedown="event.stopPropagation();jumpToFix(${m.listingIdx})">Go to Fix →</span>` : '';
    return `<div class="search-result" onmousedown="selectMatch(${mi})">
      <div class="search-result-name">${esc(m.name)}</div>
      <div class="search-result-meta">
        <span class="search-result-price">Sell $${m.price}</span>
        ${shopeeLink}${caroLink}${fixBtn}
      </div>
    </div>`;
  }).join('');
  dropdown.style.display = 'block';
}

function selectMatch(mi) {
  const m = _searchMatches[mi];
  if (!m) return;
  selectListing(m.listingIdx, m.name, m.price, m.shopee, m.caro);
}

// Preserve focused element across innerHTML re-renders
function withFocusPreserved(renderFn) {
  const focused = document.activeElement;
  const id = focused?.id;
  const sel = (focused?.tagName === 'TEXTAREA' || focused?.tagName === 'INPUT') ? focused.selectionStart : null;
  renderFn();
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.focus();
      if (sel != null) { try { el.setSelectionRange(sel, sel); } catch(e) {} }
    }
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function addSwipeGestures() {
  const card = document.querySelector('#listing-wrap .listing-card');
  if (!card) return;
  let startX = 0, startY = 0, swiping = false;
  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
  }, { passive: true });
  card.addEventListener('touchmove', e => {
    if (!swiping) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dy) > Math.abs(dx)) swiping = false; // cancel if mostly vertical
  }, { passive: true });
  card.addEventListener('touchend', e => {
    if (!swiping) return;
    swiping = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.7) return;
    if (dx > 0) markDone(); else markDeleted();
  }, { passive: true });
}

function deleteSale(idx) {
  const removed = salesLog.splice(idx, 1)[0];
  localStorage.setItem('carobiz_sales', JSON.stringify(salesLog));
  pushToSupabase();
  renderSalesView();
  renderSessionBar();
  toastWithUndo('Sale removed', () => {
    salesLog.splice(idx, 0, removed);
    localStorage.setItem('carobiz_sales', JSON.stringify(salesLog));
    pushToSupabase();
    renderSalesView();
    renderSessionBar();
  });
}

function renderSalesView() {
  document.getElementById('revenue-display').textContent = '$' + todayRevenue().toFixed(2);
  const list = document.getElementById('sales-list');
  if (salesLog.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);font-size:13px;padding:24px 0">No sales yet</p>';
    renderBreakdown();
    return;
  }
  const today = getToday();
  let lastDate = null;
  list.innerHTML = salesLog.map((s, idx) => {
    let header = '';
    if (s.date !== lastDate) {
      lastDate = s.date;
      header = `<div style="font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-tertiary);padding:8px 4px 4px">${s.date === today ? 'Today' : esc(s.date)}</div>`;
    }
    const profit = s.sourceCost ? (s.price - s.sourceCost) : null;
    const meta = [s.category, profit !== null ? `+$${profit.toFixed(0)} profit` : null].filter(Boolean).join(' · ');
    return header + `<div class="sale-entry">
      <div class="sale-info">
        <div class="sale-name">${esc(s.name)}</div>
        <div class="sale-meta">${meta || esc(s.date)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="sale-price">$${parseFloat(s.price).toFixed(2)}</div>
        <button class="copy-btn" style="color:var(--danger);border-color:rgba(224,88,88,0.3)" onclick="deleteSale(${idx})">✕</button>
      </div>
    </div>`;
  }).join('');
  renderBreakdown();
}

function renderBreakdown() {
  const el = document.getElementById('sales-breakdown');
  if (!el) return;
  const withCat = salesLog.filter(s => s.category);
  if (withCat.length === 0) { el.innerHTML = ''; return; }
  const groups = {};
  for (const s of withCat) {
    if (!groups[s.category]) groups[s.category] = { count: 0, profit: 0 };
    groups[s.category].count++;
    groups[s.category].profit += s.price - (s.sourceCost || 0);
  }
  const rows = Object.entries(groups)
    .sort((a, b) => b[1].profit - a[1].profit)
    .map(([cat, g]) => `<div class="breakdown-row">
      <div class="breakdown-cat">${esc(cat)}</div>
      <div class="breakdown-stats">
        <span>${g.count} sale${g.count > 1 ? 's' : ''}</span>
        <span class="breakdown-profit">+$${g.profit.toFixed(0)}</span>
        <span>avg $${(g.profit / g.count).toFixed(0)}/sale</span>
      </div>
    </div>`).join('');
  el.innerHTML = `<div class="breakdown-card"><div class="breakdown-title">What's Selling</div>${rows}</div>`;
}

  if (!entry) return;
  if (entry.doneAt?.startsWith(getToday())) {
    doneTodayCount = Math.max(0, doneTodayCount - 1);

function copyField(fieldId, btnId) {
  const el = document.getElementById(fieldId);
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(() => {
    const btn = document.getElementById(btnId);
    if (btn) {
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      clearTimeout(copyTimers[btnId]);
      copyTimers[btnId] = setTimeout(() => {
        const b = document.getElementById(btnId);
        if (b) { b.textContent = 'Copy'; b.classList.remove('copied'); }
        delete copyTimers[btnId];
      }, 1500);
    }
  });
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

let _undoFn = null;
function toastWithUndo(msg, undoFn) {
  _undoFn = undoFn;
  const el = document.getElementById('toast');
  el.innerHTML = esc(msg) + '  <button onclick="_undoFn&&_undoFn()" style="background:none;border:none;color:var(--coral);font-size:12px;font-weight:700;cursor:pointer;padding:0;letter-spacing:0.06em">UNDO</button>';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('show'); _undoFn = null; }, 4000);
}

// Keyboard shortcuts for FIX tab (desktop)
document.addEventListener('keydown', e => {
  if (activeTab !== 'fix') return;
  if (e.target.matches('input, textarea, select')) return;
  if (currentIndex >= LISTINGS.length) return;
  if (e.key === 'd' || e.key === 'D') { e.preventDefault(); markDone(); }
  if (e.key === 'x' || e.key === 'X' || e.key === 'Delete') { e.preventDefault(); markDeleted(); }
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && getToday() !== todayDate) {
    todayDate = getToday();
    doneTodayCount = 0;
    deletedTodayCount = 0;
    saveLocal();
    renderAll();
  }
});

init();
</script>
</body>
</html>
