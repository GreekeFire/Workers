<script>
function calcSell(cost) {
  const c = parseFloat(cost) || 0;
  const raw = Math.ceil(Math.max(c * 1.5, c + 24) / 5) * 5;
  return raw;
}

// Highest variant price from a scraped Shopee payload — the margin-safe cost
// default. Single source of truth so every pull/batch path costs identically.
function highestCost(p) {
  return Math.max(p.price_max || 0, p.price_min || 0, ...((p.models || []).map(m => m.price || 0)));
}

function onCostChange(val) {
  editedCost = parseFloat(val) || 0;
  const el = document.getElementById('sell-display');
  if (el) el.textContent = '$' + calcSell(editedCost).toFixed(2);
}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Returns today's date string YYYY-MM-DD (recomputed each call so midnight rollovers work)
function getToday() { return new Date().toISOString().slice(0, 10); }

// Listings (loaded from Supabase)
let LISTINGS = [];      // [{ id, title, shopee, caro, cost, sell }, ...]

// State
let currentIndex = 0;
let doneSet = new Set();
let deletedSet = new Set();
let doneData = [];
let doneTodayCount = 0;
let deletedTodayCount = 0;
let todayDate = getToday();
let salesLog = [];
let activeTab = 'fix';

// AI state
let aiLoading = false;
let _fixGenSeq = 0;   // bumped when the FIX card changes; stale generations check it
let fixCostNote = ''; // inline cost-change note on the FIX card (toast would clobber UNDO)
let fixNoload = false;  // matched scrape couldn't load Shopee data → advisory "verify & Delete" banner
let fixPullMiss = false; // auto-pull found no scrape for this card → inline "unable to pull" hint
let preGenCache = {};    // listingId → {title,desc,sourceText} | {pending,sourceText}: AI generated for the NEXT card ahead of time
let aiTitle = '';
let aiDesc = '';
let editedCost = null;
let shopeeInput = '';
let shopeeCollapsed = false;
let apiKeyVisible = false;
let fixShopeeImages = [];
let fixShopeeFetching = false;
let fixFetchCollapsed = false;

// Undo / copy state
let undoTimer = null;
let undoStack = [];
const copyTimers = {};

// API key (lifted out of render to avoid repeated localStorage reads)
let savedApiKey = localStorage.getItem('alfred_claude_key') || '';

// NEW tab state
let newTitle = '';
let newDesc = '';
let newShopeeInput = '';
let newCost = '';
let newShopeeUrl = '';
let newCaroUrl = '';
let newLoading = false;
let newShopeeCollapsed = false;
let newShopeeImages = [];
let newShopeeFetching = false;
let newApiKeyVisible = false;
let newFetchCollapsed = false;
let newBatchRunning = false;
let newBatchResults = []; // [{ url, status, title, desc }]

let linkEditing = false;

// Init
async function init() {
  loadLocal();
  renderAll();
  await loadListingsFromSupabase();
  await syncFromSupabase();
  currentIndex = findNext(currentIndex);
  renderAll();
  maybeBackupNudge();
}

async function loadListingsFromSupabase() {
  try {
    const { data, error } = await sb
      .from('listings')
      .select('id,title,shopee_url,carousell_url,source_cost,sell_price')
      .eq('status', 'active')
      .order('id');
    if (error) throw error;
    LISTINGS = data.map(r => ({
      id: r.id, title: r.title, shopee: r.shopee_url, caro: r.carousell_url,
      cost: r.source_cost == null ? '' : String(r.source_cost),
      sell: r.sell_price  == null ? '' : String(r.sell_price)
    }));
  } catch (e) {
    console.error('Failed to load listings from Supabase:', e);
  }
}

function loadLocal() {
  todayDate = getToday();
  const rawSales = localStorage.getItem('carobiz_sales');
  if (rawSales) salesLog = JSON.parse(rawSales);
  // Restore NEW tab draft
  try {
    const rawDraft = localStorage.getItem('carobiz_new_draft');
    if (rawDraft) {
      const d = JSON.parse(rawDraft);
      newTitle      = d.title      || '';
      newDesc       = d.desc       || '';
      newShopeeInput= d.shopeeInput|| '';
      newShopeeUrl  = d.shopeeUrl  || '';
      newCaroUrl    = d.caroUrl    || '';
      newCost       = d.cost       || '';
      if (newTitle || newDesc) newShopeeCollapsed = true;
    }
  } catch(e) {}
}

async function syncFromSupabase() {
  try {
    const [dRes, sRes] = await Promise.all([
      sb.from('app_state').select('data').eq('key', 'carobiz_done_data').single(),
      sb.from('app_state').select('data').eq('key', 'carobiz_sales').single()
    ]);

    if (dRes.data?.data) {
      const cloud = dRes.data.data;
      // Merge instead of replace: an item marked done on Device A while Device B
      // was open would be lost if Device B pushed later. Keep any local entries
      // not already in the cloud copy (matched by stable id + doneAt timestamp).
      const cloudKeys = new Set(cloud.map(d => (d.id ?? '') + '|' + (d.doneAt || '')));
      const localOnly = doneData.filter(d => !cloudKeys.has((d.id ?? '') + '|' + (d.doneAt || '')));
      doneData = [...cloud, ...localOnly].sort((a, b) => (b.doneAt || '').localeCompare(a.doneAt || ''));
      if (localOnly.length) pushToSupabase();   // persist recovered entries
      // Rebuild doneSet by matching each done entry's stable Supabase id to its
      // current position in the active list. Done rows are excluded from the
      // active query, so this is empty in the normal case — it only re-marks an
      // item if a prior status='done' write failed to persist. Never trust the
      // stored positional index: the active list shifts as listings complete.
      doneSet = new Set(
        doneData
          .map(d => (d.id != null ? LISTINGS.findIndex(l => l.id === d.id) : -1))
          .filter(i => i >= 0)
      );
      doneTodayCount = doneData.filter(d => d.doneAt?.startsWith(getToday())).length;
    }

    if (sRes.data?.data) {
      // Merge instead of replace: a sale logged while a push failed (and the
      // app then closed) lives only in localStorage — keep local entries newer
      // than the newest cloud entry. Older local-only entries are treated as
      // deleted on another device, not resurrected.
      const cloud = sRes.data.data;
      const newestCloudTs = cloud.reduce((m, s) => ((s.ts || '') > m ? s.ts : m), '');
      const cloudTs = new Set(cloud.map(s => s.ts));
      const localOnly = salesLog.filter(s => s.ts && !cloudTs.has(s.ts) && s.ts > newestCloudTs);
      salesLog = [...localOnly, ...cloud].sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));
      localStorage.setItem('carobiz_sales', JSON.stringify(salesLog));
      if (localOnly.length) pushToSupabase();   // persist the recovered sales
    }
  } catch (e) {
    console.warn('Supabase sync error:', e);
  }
}

let pendingPush = false;

async function pushToSupabase() {
  const now = new Date().toISOString();
  setSyncStatus('syncing');
  try {
    await Promise.all([
      sb.from('app_state').upsert({ key: 'carobiz_done_data', data: doneData, updated_at: now }),
      sb.from('app_state').upsert({ key: 'carobiz_sales', data: salesLog, updated_at: now })
    ]);
    pendingPush = false;
    setSyncStatus('synced');
  } catch (e) {
    console.warn('Supabase push error:', e);
    pendingPush = true;   // a sync is still owed — retry when network/app returns
    setSyncStatus('error');
  }
}

// Re-send a failed push when the network or app comes back. doneData/salesLog are
// always the latest in-memory state, so this just re-sends whatever is current.
function retryPendingPush() {
  if (pendingPush && navigator.onLine) pushToSupabase();
}
window.addEventListener('online', retryPendingPush);

let syncStatusTimer = null;
function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  clearTimeout(syncStatusTimer);
  el.className = 'sync-status visible ' + state;
  if (state === 'syncing') {
    el.textContent = '⟳ Syncing…';
  } else if (state === 'synced') {
    el.textContent = '✓ Synced';
    syncStatusTimer = setTimeout(() => { el.className = 'sync-status'; }, 3000);
  } else if (state === 'error') {
    el.textContent = '✗ Sync failed';
    syncStatusTimer = setTimeout(() => { el.className = 'sync-status'; }, 5000);
  }
}

// Queue
function findNext(from) {
  let i = from;
  while (i < LISTINGS.length && (doneSet.has(i) || deletedSet.has(i))) i++;
  return i;
}

// Step through unprocessed listings without acting on the current one.
// Discards in-progress AI state, same as Done/Delete do.
function navQueue(dir) {
  const total = LISTINGS.length;
  if (!total) return;
  let i = currentIndex;
  for (let step = 0; step < total; step++) {
    i += dir;
    if (i < 0) i = total - 1;
    if (i >= total) i = 0;
    if (!doneSet.has(i) && !deletedSet.has(i)) {
      currentIndex = i;
      resetAI();
      renderFixView();
      return;
    }
  }
}

// Re-pull everything from Supabase without restarting the PWA.
async function refreshFromCloud() {
  // Flush pending undo-window deletes first so the re-fetch reflects them
  clearTimeout(undoTimer);
  if (undoStack.length) {
    await Promise.all(undoStack.map(({ sbId }) =>
      sbId ? sb.from('listings').delete().eq('id', sbId) : null));
    undoStack = [];
  }
  deletedSet = new Set();
  setSyncStatus('syncing');
  await loadListingsFromSupabase();
  await syncFromSupabase();
  setSyncStatus('synced');
  currentIndex = findNext(0);
  renderAll();
  toast('Refreshed ✓');
}

// Download every fetched product image, staggered so the browser
// doesn't block the burst as a popup storm.
// Download a list of product images, staggered so the browser doesn't block
// the burst as a popup storm. Shared by the FIX/NEW grids and batch cards.
function downloadImages(imgs) {
  if (!imgs || !imgs.length) return;
  imgs.forEach((src, i) => setTimeout(() => {
    const a = document.createElement('a');
    a.href = `/api/image?url=${encodeURIComponent(src)}&n=${i + 1}`;
    a.download = `shopee-${i + 1}.jpg`;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }, i * 350));
  toast(`Downloading ${imgs.length} image${imgs.length > 1 ? 's' : ''}`);
}

// Once-a-day reminder when the last ⬇ Backup is over a week old.
// Supabase is the only copy of this data — the habit matters.
function maybeBackupNudge() {
  const today = getToday();
  if (localStorage.getItem('carobiz_backup_nudge_day') === today) return;
  const last = localStorage.getItem('carobiz_last_backup');
  const days = last ? Math.floor((Date.now() - new Date(last).getTime()) / 86400000) : Infinity;
  if (days >= 7) {
    localStorage.setItem('carobiz_backup_nudge_day', today);
    toast(last ? `Backup is ${days} days old — ⬇ Backup in LISTINGS` : 'No backup yet — ⬇ Backup in LISTINGS');
  }
}

// Open the next N unprocessed Shopee links in tabs (starting at the current
// listing). With AUTO harvest on, each tab self-scrapes into scrape_inbox, so
// by the time you reach it the ⬇ Pull / auto-pull already has the data matched
// by URL.
//
// Browsers block a burst of window.open() — typically only the first few of a
// 10-at-once batch get through until you allow pop-ups for this site. We track
// which URLs already opened this session (_openedLinks) so pressing the button
// again opens ONLY the ones that didn't make it last time — never duplicates.
const _openedLinks = new Set();
function openNextLinks(n) {
  const urls = [];
  for (let i = currentIndex; i < LISTINGS.length && urls.length < n; i++) {
    if (doneSet.has(i) || deletedSet.has(i)) continue;
    const u = LISTINGS[i] && LISTINGS[i].shopee;
    if (u && !_openedLinks.has(u)) urls.push(u);   // skip already-opened
  }
  if (!urls.length) { toast('No new upcoming Shopee links to open'); return; }
  let opened = 0, blocked = 0;
  for (const u of urls) {
    if (window.open(u, '_blank', 'noopener')) { _openedLinks.add(u); opened++; }
    else blocked++;
  }
  if (blocked) {
    toast(`Opened ${opened}, ${blocked} blocked — allow pop-ups, then press again for the rest`);
  } else {
    toast(`Opened ${opened} tab${opened > 1 ? 's' : ''} — AUTO will scrape them`);
  }
}

function markDone() {
  const idx = currentIndex;
  const costVal = parseFloat(editedCost !== null ? editedCost : LISTINGS[idx].cost);
  if (!(costVal > 0)) { toast('Enter a cost before marking Done'); return; }
  if (doneSet.has(idx) || deletedSet.has(idx)) {
    resetAI();
    currentIndex = findNext(idx + 1);
    renderAll();
    return;
  }
  const L = LISTINGS[idx];
  const sbId = L.id;
  const entry = {
    index: idx,
    id: sbId,
    title: aiTitle || L.title,
    description: aiDesc,
    shopeeUrl: L.shopee,
    carousellUrl: L.caro,
    sourceCost: editedCost !== null ? editedCost : L.cost,
    sellPrice: calcSell(costVal),
    doneAt: new Date().toISOString()
  };
  // Snapshot everything undo needs BEFORE resetAI clears the working state —
  // including the original row values, so an accidental Done costs nothing.
  const origCost = parseFloat(L.cost), origSell = parseFloat(L.sell);
  const undoState = {
    idx, sbId, entry, aiTitle, aiDesc, editedCost,
    orig: {
      title: L.title,
      source_cost: Number.isFinite(origCost) ? origCost : null,
      sell_price: Number.isFinite(origSell) ? origSell : null
    }
  };
  doneSet.add(idx);
  doneTodayCount++;
  doneData.push(entry);
  // Mark done in Supabase AND write back the final title/cost/sell, so the
  // catalog row matches what is actually live on Carousell — otherwise the
  // LISTINGS search only ever knows the old pre-fix title. The id-based
  // doneSet rebuild self-heals if this write is lost, but surface it so a
  // "ghost" item next boot isn't a mystery.
  if (sbId) sb.from('listings').update({
    status: 'done',
    title: entry.title,
    source_cost: costVal,
    sell_price: calcSell(costVal)
  }).eq('id', sbId)
    .then(({ error }) => { if (error) toast('Status sync failed — item may reappear'); });
  resetAI();
  currentIndex = findNext(idx + 1);
  pushToSupabase();
  renderAll();
  toastWithUndo('Done ✓', () => undoDone(undoState));
  pullScraped('fix', true);
}

function undoDone(s) {
  _undoFn = null;   // guard against a double-tap on the UNDO button
  _fixGenSeq++;     // cancel any generation started for the next card's auto-pull
  fixCostNote = ''; fixNoload = false; fixPullMiss = false;
  doneSet.delete(s.idx);
  doneTodayCount = Math.max(0, doneTodayCount - 1);
  let di = doneData.indexOf(s.entry);
  if (di === -1) di = doneData.findIndex(d => d.doneAt === s.entry.doneAt && d.id === s.entry.id);
  if (di !== -1) doneData.splice(di, 1);
  // Restore the row exactly as it was before the write-back
  if (s.sbId) sb.from('listings').update({
    status: 'active',
    title: s.orig.title,
    source_cost: s.orig.source_cost,
    sell_price: s.orig.sell_price
  }).eq('id', s.sbId).then(() => {});
  // Bring back the in-progress work so nothing is lost
  currentIndex = s.idx;
  aiTitle = s.aiTitle;
  aiDesc = s.aiDesc;
  editedCost = s.editedCost;
  pushToSupabase();
  renderAll();
  toast('Undone ✓');
}

function markDeleted() {
  const idx = currentIndex;
  if (!doneSet.has(idx) && !deletedSet.has(idx)) {
    deletedSet.add(idx);
    deletedTodayCount++;
    undoStack.push({ idx, sbId: LISTINGS[idx].id });
  }
  resetAI();
  currentIndex = findNext(idx + 1);
  renderAll();
  pullScraped('fix', true);
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    // Hard delete from Supabase after undo window
    for (const { sbId } of undoStack) {
      if (sbId) sb.from('listings').delete().eq('id', sbId).then(() => {});
    }
    undoStack = [];
    pushToSupabase();
  }, 6000);
  toastWithUndo('Deleted', undoDelete);
}

function undoDelete() {
  const entry = undoStack.pop();
  if (entry === undefined) return;
  _fixGenSeq++;     // cancel any generation started for the next card's auto-pull
  fixCostNote = ''; fixNoload = false; fixPullMiss = false;
  const idx = entry.idx ?? entry; // handle old format
  deletedSet.delete(idx);
  deletedTodayCount = Math.max(0, deletedTodayCount - 1);
  currentIndex = idx;
  clearTimeout(undoTimer);
  if (undoStack.length > 0) {
    undoTimer = setTimeout(() => {
      for (const { sbId } of undoStack) {
        if (sbId) sb.from('listings').delete().eq('id', sbId).then(() => {});
      }
      undoStack = [];
      pushToSupabase();
    }, 6000);
  }
  renderAll();
  const remaining = undoStack.length;
  toast(remaining > 0 ? `Undo ✓ (${remaining} pending)` : 'Undo ✓');
}

// AI — shared constants & helpers
const TITLE_SYSTEM = `You are a Carousell Singapore listing title writer. Buyers find the listing by typing words into search, so the title must be packed with the DISTINCT, RELEVANT terms a real buyer would type for THIS specific item.

TASK: Write one Carousell title for the product below. Output the title text only — no JSON, no quotes, no explanation.

STEP 1 — Silently identify the category from the product text:
- FURNITURE / BULKY HOME (sofa, chair, table, shelf, bed, mattress, safe, cabinet, rack): buyers search by item type, size/dimensions, material, load/weight capacity, room, style.
- ELECTRONICS / GADGET (keyboard, charger, speaker, lamp, fan, small appliance): item type, key spec, connectivity, compatibility, standout feature.
- HOMEWARE / KITCHEN (plates, cookware, storage, organiser): item type, set/piece count, material, capacity/size, use.
- If unclear, lead with item type + strongest concrete attributes.

STEP 2 — Write the title:
1. Length: 180–225 characters. Count every character. This is the strictest rule.
2. Format: pipe-separated ( | ) Title Case segments, each 3–6 words, each a complete phrase a buyer could actually type into search.
3. Front-load the single strongest search phrase in the first 40 characters — the feed truncates the visible title there.
4. COVER DIFFERENT SEARCH ANGLES — never repeat the same phrase. Each segment adds a NEW angle: item-type synonyms, a real attribute (size, material, capacity, colour), a feature, a use case. You may reuse the core item word with a DIFFERENT modifier each time, but near-duplicate segments read as keyword stuffing and get listings hidden.
5. Use ONLY attributes that appear in the product text. NEVER invent dimensions, weights, materials, capacities or compatibility.
6. Correct spelling. Do not copy source typos.
7. NEVER include: brand names, model numbers/SKUs, platform names (Shopee, Carousell, Lazada, Amazon), seller phrases ("Local Seller", "SG Seller", "Fast Delivery"), prices, the words "Brand New / Free Shipping / nice / cheap / best", emojis, or the symbols ! @ # $ % * &.

GOOD (distinct angles, not repetition):
Plastic Stool | Modern Stackable Stool | Bathroom Stool | Dining Stool | Dressing Table Stool | Compact Side Stool | Space Saving Stool | Minimalist Home Furniture

BAD (same phrase repeated — gets hidden):
Gaming Keyboard | RGB Gaming Keyboard | Best Gaming Keyboard | Gaming Keyboard SG | Gaming Keyboard Cheap

Silently count characters. If under 180 or over 225, fix by adding or removing a DISTINCT angle — never by repeating a segment. Output only the final title.`;

const DESC_SYSTEM = `You are a Carousell Singapore listing copywriter. Output ONLY a JSON object: {"description":"..."}. Plain text inside — no markdown, no **bold**, no #headers.

STEP 1 — Silently detect the category from the product text: FURNITURE/BULKY, ELECTRONICS/GADGET, or HOMEWARE/KITCHEN. This sets the depth and which details lead.

STEP 2 — Choose depth:
- HIGH-TICKET BULKY FURNITURE (sofa, table, bed, mattress, large cabinet, shelf): fuller — 6 to 8 bullets, lead with what reassures a considered buyer.
- CHEAP / SIMPLE items (small homeware, gadgets, organisers): leaner — 3 to 5 bullets. Do not pad; an over-bulleted block on a cheap item reads as spam.

STEP 3 — Write in exactly this structure:

LINE 1 (must start with 🚚): a short, punchy delivery line. MUST always include the word "Free" and "Delivery". e.g. "🚚 Free Doorstep Delivery | 1-3 Working Days". You may vary the wording naturally (e.g. "Free Delivery", "Free Doorstep Delivery", "Free Shipping") but "Free" and "Delivery" must always appear. Keep it to one tight line — do NOT cram the value-sell here.

(blank line)

ONE hook sentence: what it is + 2–3 standout features + who/what it's for.

(blank line)

Bullets, each: ✅ [Feature] — [what it means for the buyer]. ORDER BY WHAT THIS BUYER DECIDES ON:
- FURNITURE/BULKY: dimensions FIRST (will it fit), then material/build, weight or load capacity, assembly, colour/finish, room/use.
- ELECTRONICS/GADGET: key specs first, then compatibility, connectivity, features, what's in the box.
- HOMEWARE/KITCHEN: set/piece count first, then material, dimensions/capacity, microwave/dishwasher/oven safe, care.
For BULKY items, include one value bullet worded to the item, e.g. "✅ Delivered To Your Door — no lorry to rent, no carrying it up yourself". For small/light items, skip this bullet (a delivery hard-sell looks overblown).
Always include: "✅ Brand New — unused" (sealed/flat-packed as appropriate).

If the source lists colour/size variants, add ONE line BEFORE the payment line: "📦 Sizes available: ..." or "📦 Finishes available: ...". Summarise many variants into a readable range (e.g. "45×30, 55×35, 65×42cm footprints · 1 to 5 layers") — do not dump every row. Omit this line entirely if there are no variants. Then add: "💬 Message us to order or check stock".

LAST LINE (exact, verbatim, nothing after it):
💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂

RULES:
- State ONLY facts in the product text. NEVER invent dimensions, weight, material, capacity or compatibility. If a key spec is missing, write a genuine benefit bullet instead — do not guess. Wrong specs cause returns.
- No brand names, no platform names (Shopee/Lazada/Amazon).
- No vague filler on its own ("high quality", "amazing", "best", "premium") — pair a concrete feature with a concrete benefit.
- Vary phrasing between listings so descriptions never read as mass-produced duplicates.
- Keep it scannable.`;


function normalizeDesc(text) {
  if (!text) return text;
  const DELIVERY = '🚚 Free Doorstep Delivery | 1-3 Working Days';
  const PAYMENT  = '💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂';
  let lines = text.split('\n');

  // Delivery line must be first
  if (!lines[0].trim().startsWith('🚚')) {
    const idx = lines.findIndex(l => l.includes('🚚') || l.includes('FREE Local Delivery'));
    if (idx > 0) {
      const [found] = lines.splice(idx, 1);
      while (lines.length && !lines[0].trim()) lines.shift();
      lines = [found.trim(), '', ...lines];
    } else if (idx === -1) {
      lines = [DELIVERY, '', ...lines];
    }
  }

  // Payment line must be last
  const lastNonEmptyIdx = [...lines].map((l, i) => l.trim() ? i : -1).filter(i => i !== -1).pop();
  const hasPaymentAtEnd = lastNonEmptyIdx !== undefined && lines[lastNonEmptyIdx].trim() === PAYMENT;
  if (!hasPaymentAtEnd) {
    const idx = lines.findIndex(l => l.includes('💳') || l.includes('PayNow'));
    if (idx !== -1) lines.splice(idx, 1);
    while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
    lines.push('', PAYMENT);
  }

  return lines.join('\n');
}

// Routes through /api/claude so the Anthropic key never touches the browser.
// Falls back to a direct browser call with savedApiKey if the server key
// isn't configured (backwards-compatible for local dev with a saved key).
async function callClaude(system, userContent, maxTokens, temperature = 0.3, retries = 2) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    let resp, data;
    try {
      resp = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ system, userContent, maxTokens, temperature })
      });
      data = await resp.json();
    } catch (e) {
      if (attempt < retries) {
        await new Promise(r => setTimeout(r, 2000 * (attempt + 1)));
        continue;
      }
      throw e;
    }
    if (data.error) {
      // Server says key not configured — fall back to direct browser call
      if (resp.status === 500 && data.error.includes('not configured')) {
        const apiKey = savedApiKey;
        if (!apiKey) throw new Error('NO_KEY');
        const directResp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
            'content-type': 'application/json'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: maxTokens,
            temperature,
            system,
            messages: [{ role: 'user', content: userContent }]
          })
        });
        const directData = await directResp.json();
        if (directData.error) throw new Error(directData.error.message);
        return directData.content?.[0]?.text || '';
      }
      const isOverload = resp.status === 529;
      if (isOverload && attempt < retries) {
        await new Promise(r => setTimeout(r, 3000));
        continue;
      }
      throw new Error(data.error);
    }
    return data.text || '';
  }
}

async function runAIGenerate(productText, { titleOnly = false, descOnly = false } = {}) {
  const productContent = `Product info:\n\n${productText}`;
  const titlePromise = descOnly  ? null : callClaude(TITLE_SYSTEM, productContent, 512);
  const descPromise  = titleOnly ? null : callClaude(DESC_SYSTEM, productContent, 1536, 0.5);
  let rawTitle = '';
  if (!descOnly) {
    let titleText = await titlePromise;
    rawTitle = titleText.trim().split('\n')[0].trim();
    if (rawTitle.length < 180) {
      const retry = await callClaude(TITLE_SYSTEM, productContent + '\n\nIMPORTANT: Previous attempt was too short. Reach at least 180 characters by ADDING A NEW DISTINCT ANGLE (a different feature, attribute, or use case). Do NOT repeat or pad existing segments.', 512);
      rawTitle = retry.trim().split('\n')[0].trim();
    }
    if (rawTitle.length > 225) {
      const parts = rawTitle.split(' | ');
      while (parts.length > 1 && parts.join(' | ').length > 225) parts.pop();
      rawTitle = parts.join(' | ');
    }
  }
  if (titleOnly) return { title: rawTitle, desc: '' };
  const descText = await descPromise;
  const descMatch = descText.match(/\{[\s\S]*\}/);
  let desc = '';
  if (descMatch) {
    try {
      desc = normalizeDesc(JSON.parse(descMatch[0]).description || '');
    } catch {
      // Claude returned malformed JSON — strip wrapper and use raw text
      const raw = descText.replace(/^\s*\{[^"]*"description"\s*:\s*"/, '').replace(/"\s*\}\s*$/, '');
      desc = normalizeDesc(raw);
      if (!desc) throw new Error('AI returned malformed JSON — try again');
    }
  }
  return { title: rawTitle, desc };
}

// FIX tab AI
async function generateAI(mode = 'both') {
  const taEl = document.getElementById('shopee-input-ta');
  if (taEl) shopeeInput = taEl.value;
  if (!shopeeInput.trim()) { toast('Fetch or paste Shopee content first'); return; }
  const seq = _fixGenSeq;   // abort if the card changes (Done/Delete/undo) mid-flight
  aiLoading = true;
  renderFixView();
  let aiError = null;
  try {
    const { title, desc } = await runAIGenerate(shopeeInput, {
      titleOnly: mode === 'title',
      descOnly:  mode === 'desc',
    });
    if (seq !== _fixGenSeq) return;
    if (mode !== 'desc'  && title) aiTitle = title;
    if (mode !== 'title' && desc)  aiDesc  = desc;
    if (!aiTitle && !aiDesc) aiError = 'No content returned — try again';
  } catch (e) {
    if (seq !== _fixGenSeq) return;
    if (e.message === 'NO_KEY') { apiKeyVisible = true; aiLoading = false; renderFixView(); return; }
    aiError = e.message || 'Unknown error';
  }
  if (aiTitle || aiDesc) { shopeeCollapsed = true; fixFetchCollapsed = true; }
  aiLoading = false;
  renderFixView();
  if (aiError) {
    const errEl = document.createElement('div');
    errEl.style.cssText = 'background:#c0392b;color:#fff;padding:10px 14px;border-radius:8px;margin:8px 0;font-size:13px;word-break:break-all';
    errEl.textContent = 'Error: ' + aiError;
    const aiSection = document.querySelector('.ai-section');
    if (aiSection) aiSection.prepend(errEl);
  } else if (aiTitle || aiDesc) {
    // Fade the fresh copy in, then bring it into view ready to copy
    document.getElementById('title-ta')?.classList.add('fade-in');
    document.getElementById('ai-desc-ta')?.classList.add('fade-in');
    document.getElementById('title-ta')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// Product identity from any Shopee URL: "SHOPID.ITEMID". Survives
// title-slug changes, tracking params, and the /product/ URL form.
function shopeeKey(u) {
  const m = String(u || '').match(/i\.(\d+)\.(\d+)/) || String(u || '').match(/\/product\/(\d+)\/(\d+)/);
  return m ? m[1] + '.' + m[2] : '';
}

// Carousell listing id from either the edit URL (/sell/<id>/) or the public
// listing URL (/p/<slug>-<id>). Carousell ids are long (~10 digits); slugs may
// contain short numbers ("2-tier") and the query may carry a huge _branch id —
// so drop the query, then take the LAST long digit-run in the path.
function caroId(u) {
  u = String(u || '');
  let m = u.match(/\/sell\/(\d+)/);
  if (m) return m[1];
  const path = u.split('?')[0];
  const nums = path.match(/\d{6,}/g);
  return nums ? nums[nums.length - 1] : '';
}

// Publish the current FIX card's finished copy to fill_outbox, then open the
// listing. Most caro links are Branch deep links (carousell.app.link/…) with no
// id, so we publish to a single "_current" slot rather than keying by id; the
// carousell-fill userscript on the edit page reads that slot and fills the form.
// You work one listing at a time, so the latest publish is always the right one.
async function sendToCarousell() {
  const L = LISTINGS[currentIndex];
  if (!L || !L.caro) { toast('No Carousell link on this listing'); return false; }
  // Guard the race: never publish/Done while AI is still running, or before it
  // has produced BOTH title and description — otherwise F can push the old title
  // and an empty description to Carousell and mark it Done.
  if (aiLoading) { toast('Still generating — wait for the copy'); return false; }
  if (!aiTitle || !aiDesc) { toast('No AI copy yet — press G to generate first'); return false; }
  const cost = parseFloat(editedCost !== null ? editedCost : (L.cost || 0)) || 0;
  const payload = {
    title: aiTitle.trim(),
    desc: aiDesc.trim(),
    price: cost ? calcSell(cost) : null,
    ts: Date.now(),   // freshness stamp — the userscript ignores stale slots so a
  };                  // leftover pending fill can't hijack a listing you open later
  try {
    const { error } = await sb.from('fill_outbox')
      .upsert({ caro_id: '_current', payload, consumed: false }, { onConflict: 'caro_id' });
    if (error) throw error;
  } catch (e) { toast('Outbox error — ' + (e.message || 'unknown')); return false; }
  // Open the LISTING (not /sell/ directly) — hard-loading the edit URL is the
  // pattern Carousell 404s. You click its Edit button (the supported in-app
  // path) and the userscript fills once the form appears.
  window.open(L.caro, '_blank', 'noopener');
  toast('Published — click Edit on the listing; it fills automatically');
  return true;
}

// Merged action: publish + open Carousell for THIS card, then mark it Done and
// advance. Order matters — sendToCarousell captures the current card's copy
// before markDone() advances the index. Done is only marked if the Fill went
// through. (Note: the actual Carousell Save is still your Ctrl+Enter on that tab.)
async function fillAndDone() {
  const ok = await sendToCarousell();
  if (ok) markDone();
}

// Pull unconsumed bookmarklet/phone scrapes from scrape_inbox.
// NEW: one scrape fills the form, several feed the batch generator.
// FIX: takes ONLY the scrape whose URL matches the current listing's stored
// Shopee link, leaving the rest in the inbox for the NEW tab — so you can
// front-load bookmark clicks on many tabs and fix in a row.
// `silent` suppresses "nothing yet" toasts for the auto-pull paths.
async function pullScraped(target, silent) {
  if (newBatchRunning || newLoading) return;
  if (target === 'fix' && aiLoading) return;
  let rows;
  try {
    const { data, error } = await sb.from('scrape_inbox')
      .select('id,payload').eq('kind', 'shopee').eq('consumed', false)
      .order('created_at', { ascending: true });
    if (error) throw error;
    rows = data || [];
  } catch (e) {
    if (!silent) toast('Inbox error — ' + (e.message || 'unknown'));
    return;
  }
  if (!rows.length) {
    // FIX: empty inbox means nothing's been scraped for the current card → hint.
    if (target === 'fix') { fixPullMiss = true; renderFixView(); }
    else if (!silent) toast('Nothing scraped yet — use the bookmarklet first');
    return;
  }

  if (target === 'fix') {
    setTimeout(preGenerateNext, 0);   // prep the NEXT card's AI text in the background
    const L = LISTINGS[currentIndex];
    const key = shopeeKey(L && L.shopee);
    if (!key) { if (!silent) toast('This listing has no Shopee link — add one first'); return; }
    const match = rows.find(r => shopeeKey((r.payload || {}).url) === key);
    if (!match) {
      // No scrape matched this listing — likely not opened yet or delisted.
      fixPullMiss = true;
      renderFixView();
      if (!silent) toast('No scrape for this listing — Shopee ↗ to verify');
      return;
    }
    fixPullMiss = false;
    // Consume the matched row plus any duplicates with the same URL (two devices
    // scraping the same tab creates extra rows that would otherwise pile up forever)
    const dupeIds = rows.filter(r => shopeeKey((r.payload || {}).url) === key).map(r => r.id);
    sb.from('scrape_inbox').update({ consumed: true }).in('id', dupeIds).then(() => {});
    const p = match.payload || {};
    // Couldn't-load marker: the scraper sat on this product page and Shopee
    // never populated any data — likely a delisted/dead source. Advisory only:
    // show a banner prompting you to verify on Shopee ↗ and Delete if dead,
    // rather than filling the card.
    if (p.unloaded) {
      fixNoload = true;
      fixCostNote = '';
      renderFixView();
      if (!silent) toast("Couldn't load Shopee data — verify & Delete");
      return;
    }
    fixNoload = false;
    shopeeInput     = [p.title, p.description].filter(Boolean).join('\n\n');
    fixShopeeImages = p.images || [];
    shopeeCollapsed = true;
    // Refresh cost from the live scraped price (highest variant) and surface
    // the change — supplier price moves are exactly what kills margins
    const newCostVal = highestCost(p);
    const curCost = parseFloat(editedCost !== null ? editedCost : (L.cost || 0)) || 0;
    if (newCostVal && Math.abs(newCostVal - curCost) > 0.005) {
      editedCost = String(newCostVal);
      // Inline note, not a toast — a toast here would clobber the Done ✓ UNDO
      fixCostNote = `Cost $${curCost.toFixed(2)} → $${newCostVal.toFixed(2)} · sell $${calcSell(newCostVal).toFixed(2)}`;
      if (!silent) toast(fixCostNote);
    } else if (!silent) {
      toast('Pulled ✓' + (newCostVal ? ` — cost $${newCostVal.toFixed(2)} unchanged` : ''));
    }
    // If this card was pre-generated in the background while you worked the
    // previous one, apply it instantly — no spinner. Guard on the exact source
    // text so a stale/re-scraped payload never shows the wrong product's copy.
    const cached = L.id ? preGenCache[L.id] : null;
    if (cached && !cached.pending && cached.sourceText === shopeeInput && (cached.title || cached.desc)) {
      aiTitle = cached.title || '';
      aiDesc  = cached.desc  || '';
      delete preGenCache[L.id];
      shopeeCollapsed = true; fixFetchCollapsed = true;
      renderFixView();
    } else {
      renderFixView();
      if (shopeeInput) generateAI('both');
    }
    return;
  }

  // NEW tab: drop couldn't-load markers (they belong to FIX, nothing to list)
  rows = rows.filter(r => !(r.payload || {}).unloaded);
  // Sort each scrape by what it already matches, by stable Shopee id:
  //  - active listing → belongs to the FIX queue; leave it on the belt for FIX
  //  - done listing   → already finished; a useless re-scrape, so consume it to
  //                     stop already-done products piling back up in the inbox
  //  - neither        → genuinely new; ingest into NEW
  const keyOf = r => shopeeKey((r.payload || {}).url);
  const activeKeys = new Set(LISTINGS.map(l => shopeeKey(l && l.shopee)).filter(Boolean));
  const doneKeys   = new Set(doneData.map(d => shopeeKey(d.shopeeUrl)).filter(Boolean));
  const matchedDone   = rows.filter(r => !activeKeys.has(keyOf(r)) && doneKeys.has(keyOf(r)));
  const matchedActive = rows.filter(r => activeKeys.has(keyOf(r)));
  rows = rows.filter(r => !activeKeys.has(keyOf(r)) && !doneKeys.has(keyOf(r)));
  // Clear already-done re-scrapes off the belt so they don't keep returning
  if (matchedDone.length) sb.from('scrape_inbox').update({ consumed: true }).in('id', matchedDone.map(r => r.id)).then(() => {});
  if (!rows.length) {
    if (!silent) {
      if (matchedDone.length) toast(matchedDone.length === 1 ? 'You already did this one ✓' : `You already did these ${matchedDone.length} ✓`);
      else if (matchedActive.length) toast('Already in your FIX queue — fix it there');
      else toast('Nothing new to pull — scrape a product first');
    }
    return;
  }
  if (rows.length > 1) {
    // Don't consume yet — keep scrapes on the belt until each card is resolved
    // (Save to Done or Clear). A refresh mid-batch then re-pulls and regenerates
    // instead of losing the cards. Skip any scrape that already has a card
    // showing, so re-pulls (e.g. landing back on NEW) don't duplicate or
    // needlessly regenerate.
    // "Showing" = every product already on the NEW tab: batch cards AND the
    // single NEW form (newShopeeUrl). Without the latter, a product sitting in
    // the single form would get added a second time as a batch card.
    const showing = new Set([
      ...newBatchResults.map(c => shopeeKey(c.url)),
      shopeeKey(newShopeeUrl),
    ].filter(Boolean));
    const fresh = rows.filter(r => !showing.has(keyOf(r)));
    if (!fresh.length) { if (!silent) toast('Already loaded — resolve the cards below'); return; }
    toast(`Pulled ${fresh.length} scrape${fresh.length > 1 ? 's' : ''} → batch`);
    ingestScrapedBatch(fresh.map(r => ({ payload: r.payload || {}, inboxId: r.id })));
    return;
  }

  // Single scrape → fills the NEW form. Consume up front: the form's draft is
  // saved to localStorage, so a refresh restores it without needing the belt.
  sb.from('scrape_inbox').update({ consumed: true }).in('id', rows.map(r => r.id)).then(() => {});
  const p = rows[rows.length - 1].payload || {};
  const text = [p.title, p.description].filter(Boolean).join('\n\n');
  // Default cost to the most expensive variant — safest for margin
  const defCost = highestCost(p);
  const priceNote = defCost ? ` — cost $${defCost.toFixed(2)}` : '';
  newShopeeInput  = text;
  newShopeeImages = p.images || [];
  newShopeeUrl    = p.url || newShopeeUrl;
  if (defCost) {
    newCost = String(defCost);
    saveDraft();
  }
  newShopeeCollapsed = true;
  renderNewView();
  if (newShopeeInput) generateAINew('both');
  toast('Pulled ✓' + priceNote);
}

// Pre-generate the NEXT unprocessed FIX card's AI text in the background while
// you work the current one, so advancing shows finished copy with no spinner.
// Reads the matching scrape WITHOUT consuming it; the row is consumed normally
// when that card actually becomes current. Cheap-but-not-free, so it's gated:
// needs an API key, a matching live scrape, and runs at most once per listing.
async function preGenerateNext() {
  if (!savedApiKey) return;                              // no key → would NO_KEY, skip
  const ni = findNext(currentIndex + 1);
  if (ni >= LISTINGS.length) return;
  const L = LISTINGS[ni];
  if (!L || !L.id || preGenCache[L.id]) return;          // already done / in flight
  const key = shopeeKey(L.shopee);
  if (!key) return;
  let rows;
  try {
    const { data, error } = await sb.from('scrape_inbox')
      .select('id,payload').eq('kind', 'shopee').eq('consumed', false)
      .order('created_at', { ascending: true });
    if (error) return;
    rows = data || [];
  } catch (e) { return; }
  const match = rows.find(r => shopeeKey((r.payload || {}).url) === key);
  if (!match) return;
  const p = match.payload || {};
  if (p.unloaded || p.dead) return;                      // nothing to generate
  const text = [p.title, p.description].filter(Boolean).join('\n\n');
  if (!text) return;
  if (preGenCache[L.id]) return;                         // re-check after await
  preGenCache[L.id] = { pending: true, sourceText: text };
  try {
    const { title, desc } = await runAIGenerate(text);
    preGenCache[L.id] = { title, desc, sourceText: text };
    // If you advanced onto this card while it was still generating (and it
    // pulled the same source, isn't already filled, and no live gen is running),
    // apply the result now so you still skip the wait.
    const cur = LISTINGS[currentIndex];
    if (cur && cur.id === L.id && shopeeInput === text && !aiTitle && !aiLoading) {
      aiTitle = title || ''; aiDesc = desc || '';
      delete preGenCache[L.id];
      shopeeCollapsed = true; fixFetchCollapsed = true;
      renderFixView();
    }
  } catch (e) {
    delete preGenCache[L.id];                             // failed → normal gen on arrival
  }
}

// Batch ingest of pre-scraped payloads — no /api/shopee fetch needed,
// the bookmarklet already delivered the full product text + price
async function ingestScrapedBatch(items) {
  if (newBatchRunning) return;
  newBatchRunning = true;
  // Append (don't replace) so a re-pull adds fresh cards without wiping unsaved
  // ones already on screen. Each card remembers its source inbox row (inboxId)
  // so saving or clearing it can take that exact scrape off the belt.
  const startIdx = newBatchResults.length;
  items.forEach(it => newBatchResults.push({ url: (it.payload || {}).url || '', inboxId: it.inboxId, status: 'loading', loadingMsg: 'Generating…' }));
  renderNewView();
  for (let i = 0; i < items.length; i++) {
    const idx = startIdx + i;
    const p = items[i].payload || {};
    const inboxId = items[i].inboxId;
    try {
      const text = [p.title, p.description].filter(Boolean).join('\n\n');
      if (!text) throw new Error('Empty scrape');
      const cost = highestCost(p);
      const imgs = p.images || [];
      try {
        const { title, desc } = await runAIGenerate(text);
        newBatchResults[idx] = { url: p.url || '', inboxId, status: 'done', title, desc, price: cost, images: imgs, sourceText: text, sourceCollapsed: true };
      } catch (e) {
        // AI unavailable — store scraped text as source, leave title/desc blank for manual generate
        newBatchResults[idx] = {
          url: p.url || '', inboxId, status: 'done', price: cost, images: imgs,
          title: '', desc: '', sourceText: text, sourceCollapsed: true,
        };
      }
    } catch (e) {
      newBatchResults[idx] = { url: p.url || '', inboxId, status: 'error', error: e.message || 'unknown' };
    }
    renderNewView();
  }
  newBatchRunning = false;
  renderNewView();
}

function saveApiKeyBatch(i) {
  saveApiKeyFrom(`bkey-${i}`, () => {
    if (newBatchResults[i]) newBatchResults[i].keyVisible = false;
    renderNewView();
  });
}

// Re-fetch a batch card's product from its URL via /api/shopee
async function fetchBatchShopee(i) {
  const r = newBatchResults[i];
  if (!r || !r.url || !r.url.trim()) { toast('Enter a Shopee URL first'); return; }
  newBatchResults[i] = { ...r, batchFetching: true };
  renderNewView();
  try {
    const res  = await fetch(`/api/shopee?url=${encodeURIComponent(r.url.trim())}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Fetch failed');
    const text = [data.title, data.description].filter(Boolean).join('\n\n');
    newBatchResults[i] = {
      ...newBatchResults[i], batchFetching: false,
      sourceText: text || newBatchResults[i].sourceText, sourceCollapsed: true,
      images: (data.images && data.images.length) ? data.images : newBatchResults[i].images,
      price: data.price_max || data.price || newBatchResults[i].price || 0,
    };
    toast('Fetched ✓');
  } catch (e) {
    newBatchResults[i] = { ...newBatchResults[i], batchFetching: false };
    toast('Fetch failed — ' + (e.message || 'unknown'));
  }
  renderNewView();
}

async function generateBatchItem(i) {
  const r = newBatchResults[i];
  if (!r) return;
  const text = r.sourceText || [r.title, r.desc].filter(Boolean).join('\n\n');
  if (!text.trim()) { toast('No source text to generate from'); return; }
  newBatchResults[i] = { ...r, batchLoading: true };
  renderNewView();
  try {
    const { title, desc } = await runAIGenerate(text);
    newBatchResults[i] = { ...newBatchResults[i], batchLoading: false, title, desc };
  } catch (e) {
    newBatchResults[i] = { ...newBatchResults[i], batchLoading: false };
    if (e.message === 'NO_KEY') { newApiKeyVisible = true; }
    else toast('Generate failed — ' + e.message);
  }
  renderNewView();
}

// NEW tab AI
async function generateAINew(mode = 'both') {
  const taEl = document.getElementById('new-shopee-ta');
  if (taEl) newShopeeInput = taEl.value;
  if (!newShopeeInput.trim()) { toast('Fetch or paste Shopee content first'); return; }
  newLoading = true;
  renderNewView();
  let aiError = null;
  try {
    const { title, desc } = await runAIGenerate(newShopeeInput, {
      titleOnly: mode === 'title',
      descOnly:  mode === 'desc',
    });
    if (mode !== 'desc'  && title) newTitle = title;
    if (mode !== 'title' && desc)  newDesc  = desc;
    if (!newTitle && !newDesc) aiError = 'No content returned — try again';
  } catch (e) {
    if (e.message === 'NO_KEY') { newApiKeyVisible = true; newLoading = false; renderNewView(); return; }
    aiError = e.message || 'Unknown error';
  }
  if (newTitle || newDesc) { newShopeeCollapsed = true; newFetchCollapsed = true; }
  newLoading = false;
  saveDraft();
  renderNewView();
  if (aiError) {
    const errEl = document.createElement('div');
    errEl.style.cssText = 'background:#c0392b;color:#fff;padding:10px 14px;border-radius:8px;margin:8px 0;font-size:13px;word-break:break-all';
    errEl.textContent = 'Error: ' + aiError;
    document.getElementById('new-wrap')?.prepend(errEl);
  } else if (newTitle || newDesc) {
    document.getElementById('new-title-ta')?.classList.add('fade-in');
    document.getElementById('new-desc-ta')?.classList.add('fade-in');
    document.getElementById('new-title-ta')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function saveApiKeyNew() {
  saveApiKeyFrom('new-api-key-input', () => { newApiKeyVisible = false; renderNewView(); });
}

let _savingNew = false;

const _batchCopyTimers = {};
function copyBatch(i, field) {
  const taId  = field === 'title' ? `btt-${i}` : `bdt-${i}`;
  const btnId = field === 'title' ? `bct-${i}` : `bcd-${i}`;
  const ta  = document.getElementById(taId);
  const btn = document.getElementById(btnId);
  if (!ta || !ta.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    btn.textContent = 'Copied ✓'; btn.classList.add('copied');
    clearTimeout(_batchCopyTimers[btnId]);
    _batchCopyTimers[btnId] = setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// Clear (your "delete") also resolves the scrape — take it off the belt so a
// re-pull or refresh doesn't bring a card you've rejected back.
function clearBatchItem(i) {
  const r = newBatchResults[i];
  if (r && r.inboxId) sb.from('scrape_inbox').update({ consumed: true }).eq('id', r.inboxId).then(() => {});
  newBatchResults.splice(i, 1);
  renderNewView();
}

async function saveBatchItem(i) {
  const r = newBatchResults[i];
  if (!r || !r.title) { toast('No title to save'); return; }
  const cost = r.price || 0;
  const sell = cost ? calcSell(cost) : 0;
  const { data, error } = await sb.from('listings').insert({
    title: r.title, status: 'done', shopee_url: r.url || '',
    source_cost: cost, sell_price: sell
  }).select('id').single();
  const sbId = error ? null : data?.id;
  doneData.push({
    index: null, id: sbId, title: r.title, description: r.desc || '',
    shopeeUrl: r.url, carousellUrl: r.caroUrl || '', sourceCost: cost, sellPrice: sell,
    doneAt: new Date().toISOString()
  });
  // Resolved — take the source scrape off the belt and drop the card
  if (r.inboxId) sb.from('scrape_inbox').update({ consumed: true }).eq('id', r.inboxId).then(() => {});
  newBatchResults.splice(i, 1);
  pushToSupabase();
  renderSessionBar();
  renderNewView();
  toast('Saved ✓');
}

async function batchGenerateNew() {
  if (newBatchRunning) return;
  const urlsEl = document.getElementById('new-batch-urls');
  const urls = (urlsEl?.value || '').split('\n').map(s => s.trim()).filter(s => s.startsWith('http'));
  if (!urls.length) { toast('Paste at least one Shopee URL'); return; }

  newBatchRunning = true;
  newBatchResults = urls.map(url => ({ url, status: 'loading', loadingMsg: 'Fetching…' }));
  renderNewView();

  for (let i = 0; i < urls.length; i++) {
    try {
      const res  = await fetch(`/api/shopee?url=${encodeURIComponent(urls[i])}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Fetch failed');
      const productText = [data.title, data.description].filter(Boolean).join('\n\n');
      if (!productText) throw new Error('No product text returned');

      newBatchResults[i].loadingMsg = 'Generating…';
      renderNewView();

      const { title, desc } = await runAIGenerate(productText);
      newBatchResults[i] = { url: urls[i], status: 'done', title, desc };
    } catch (e) {
      newBatchResults[i] = { url: urls[i], status: 'error', error: e.message || 'unknown' };
    }
    renderNewView();
  }

  newBatchRunning = false;
  renderNewView();
}

async function saveNewListing() {
  const titleEl  = document.getElementById('new-title-ta');
  const costEl   = document.getElementById('new-cost-input');
  const shopeeEl = document.getElementById('new-shopee-fetch-url');
  const caroEl   = document.getElementById('new-caro-url');
  const descEl   = document.getElementById('new-desc-ta');
  if (titleEl)  newTitle     = titleEl.value.trim();
  if (descEl)   newDesc      = descEl.value.trim();
  if (costEl)   newCost      = costEl.value;
  if (shopeeEl) newShopeeUrl = shopeeEl.value.trim();
  if (caroEl)   newCaroUrl   = caroEl.value.trim();
  if (!newTitle) { toast('Add a title first'); return; }
  if (_savingNew) return;   // double-tap during the awaited insert = duplicate rows
  _savingNew = true;
  const cost = parseFloat(newCost) || 0;
  const sell = calcSell(cost);
  // Insert into the listings table so it shows up in LISTINGS search —
  // doneData alone is not queried there
  let sbId = null;
  try {
    const { data, error } = await sb.from('listings').insert({
      title: newTitle, shopee_url: newShopeeUrl, carousell_url: newCaroUrl,
      source_cost: cost, sell_price: sell, status: 'done'
    }).select('id').single();
    if (error) throw error;
    sbId = data.id;
  } catch (e) {
    console.warn('Failed to insert listing row:', e);
    toast('Saved, but not added to LISTINGS catalog');
  }
  _savingNew = false;   // past the only await — the rest runs synchronously
  doneData.push({
    index: null,
    id: sbId,
    title: newTitle,
    description: newDesc,
    shopeeUrl: newShopeeUrl,
    carousellUrl: newCaroUrl,
    sourceCost: cost,
    sellPrice: sell,
    doneAt: new Date().toISOString()
  });
  // Reset new tab
  newTitle = ''; newDesc = ''; newShopeeInput = ''; newCost = '';
  newShopeeUrl = ''; newCaroUrl = ''; newShopeeCollapsed = false;
  newShopeeImages = []; newShopeeFetching = false;
  localStorage.removeItem('carobiz_new_draft');
  pushToSupabase();
  renderSessionBar();
  switchTab('done');
  toast('Saved to Done ✓');
}

// Sales
function logSale() {
  const name = document.getElementById('sale-listing').value.trim();
  const price = parseFloat(document.getElementById('sale-price').value);
  if (!name || isNaN(price) || price <= 0) { toast('Fill in listing and sell price'); return; }
  const category   = document.getElementById('sale-category').value;
  const sourceCost = parseFloat(document.getElementById('sale-cost').value) || 0;
  salesLog.unshift({ name, price, sourceCost, category, date: getToday(), ts: new Date().toISOString() });
  document.getElementById('sale-listing').value = '';
  document.getElementById('sale-price').value = '';
  document.getElementById('sale-cost').value = '';
  document.getElementById('sale-category').value = '';
  document.getElementById('sale-listing-info').style.display = 'none';
  localStorage.setItem('carobiz_sales', JSON.stringify(salesLog));
  pushToSupabase();
  renderSalesView();
  renderSessionBar();
  toast('Logged ✓');
}

let _searchMatches = [];

function searchListings(query) {
  const dropdown = document.getElementById('search-dropdown');
  if (!query.trim()) { dropdown.style.display = 'none'; _searchMatches = []; return; }
  // Word-based match (same approach as the LISTINGS search): every word must
  // appear, any order — immune to pasted non-breaking spaces, pipes, dashes
  const terms = query.toLowerCase().split(/[^\p{L}\p{N}]+/u).filter(t => t.length > 1);
  if (!terms.length) terms.push(query.toLowerCase().trim());
  const matchesQuery = title => { const t = title.toLowerCase(); return terms.every(w => t.includes(w)); };
  _searchMatches = [];
  _searchSel = -1;
  // Search done listings first — uses AI-rewritten titles
  for (const d of doneData) {
    if (_searchMatches.length >= 8) break;
    if (!matchesQuery(d.title)) continue;
    // Resolve the entry's current queue position by stable id — null when the
    // listing is no longer active. The stored d.index goes stale as the list shifts.
    const li = d.id != null ? LISTINGS.findIndex(l => l.id === d.id) : -1;
    _searchMatches.push({
      name: d.title,
      price: d.sellPrice,
      shopee: d.shopeeUrl ?? '',
      caro:   d.carousellUrl ?? '',
      cost: d.sourceCost,
      listingIdx: li >= 0 ? li : null
    });
  }
  // Fall back to unprocessed LISTINGS by original title
  for (let i = 0; i < LISTINGS.length && _searchMatches.length < 10; i++) {
    if (doneSet.has(i) || deletedSet.has(i)) continue;
    if (!matchesQuery(LISTINGS[i].title)) continue;
    _searchMatches.push({ name: LISTINGS[i].title, price: LISTINGS[i].sell, shopee: LISTINGS[i].shopee, caro: LISTINGS[i].caro, listingIdx: i });
  }
  if (_searchMatches.length === 0) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = _searchMatches.map((m, mi) => {
    const shopeeLink = m.shopee ? `<a class="search-result-link" href="${esc(m.shopee)}" target="_blank" rel="noopener" onmousedown="event.stopPropagation()">Shopee ↗</a>` : '';
    const caroLink  = m.caro   ? `<a class="search-result-link" href="${esc(m.caro)}"   target="_blank" rel="noopener" onmousedown="event.stopPropagation()">Carousell ↗</a>` : '';
    const isDone = m.listingIdx === null || doneSet.has(m.listingIdx) || deletedSet.has(m.listingIdx);
    const fixBtn = !isDone ? `<span class="search-result-link" style="cursor:pointer" onmousedown="event.stopPropagation();jumpToFix(${m.listingIdx})">Go to Fix →</span>` : '';
    return `<div class="search-result" onmousedown="selectMatch(${mi})">
      <div class="search-result-name">${esc(m.name)}</div>
      <div class="search-result-meta">
        <span class="search-result-price">Sell $${m.price}</span>
        ${shopeeLink}${caroLink}${fixBtn}
      </div>
    </div>`;
  }).join('');
  dropdown.style.display = 'block';
}

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _searchSel = Math.min(_searchSel + 1, _searchMatches.length - 1);
    _highlightSearchSel();
  } else if (e.key === 'ArrowUp') {

// Preserve focused element across innerHTML re-renders
function withFocusPreserved(renderFn) {
  const focused = document.activeElement;
  const id = focused?.id;
  const sel = (focused?.tagName === 'TEXTAREA' || focused?.tagName === 'INPUT') ? focused.selectionStart : null;
  renderFn();
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.focus();
      if (sel != null) { try { el.setSelectionRange(sel, sel); } catch(e) {} }
    }
  }
}

function addSwipeGestures() {
  const card = document.querySelector('#listing-wrap .listing-card');
  if (!card) return;
  let startX = 0, startY = 0, swiping = false, cancelled = false, buzzed = false;

  // Swipe reveal overlay
  let reveal = card.querySelector('.swipe-reveal');
  if (!reveal) {
    reveal = document.createElement('div');
    reveal.className = 'swipe-reveal';
    reveal.style.cssText = 'position:absolute;top:0;bottom:0;left:0;right:0;border-radius:inherit;display:flex;align-items:center;padding:0 28px;pointer-events:none;opacity:0;transition:opacity 0.1s;z-index:0;';
    card.style.position = 'relative';
    card.style.overflow = 'hidden';
    card.insertBefore(reveal, card.firstChild);
  }

  const THRESHOLD = 110;

  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
    cancelled = false;
    buzzed = false;
    card.style.transition = 'none';
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (!swiping || cancelled) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dy) > Math.abs(dx)) { cancelled = true; card.style.transform = ''; reveal.style.opacity = 0; return; }
    if (Math.abs(dx) < 8) return;
    const progress = Math.min(Math.abs(dx) / THRESHOLD, 1);
    card.style.transform = `translateX(${dx > 0 ? Math.min(dx, THRESHOLD * 1.1) : Math.max(dx, -THRESHOLD * 1.1)}px)`;
    reveal.style.opacity = progress;
    // Haptic tick the moment the swipe crosses the commit threshold (Android;
    // iOS Safari has no vibration API)
    if (progress >= 1 && !buzzed) { buzzed = true; navigator.vibrate?.(15); }
    if (dx > 0) {
      reveal.style.justifyContent = 'flex-start';
      reveal.style.background = `rgba(224,88,88,${0.15 * progress})`;
      reveal.textContent = progress >= 1 ? 'Delete ✕' : 'Swipe →';
      reveal.style.color = 'var(--danger)';
      reveal.style.fontWeight = '700';
      reveal.style.fontSize = '14px';
    } else {
      reveal.style.justifyContent = 'flex-end';
      reveal.style.background = `rgba(107,227,164,${0.15 * progress})`;
      reveal.textContent = progress >= 1 ? 'Done ✓' : '← Swipe';
      reveal.style.color = 'var(--success)';
      reveal.style.fontWeight = '700';
      reveal.style.fontSize = '14px';
    }
  }, { passive: true });

  card.addEventListener('touchend', e => {
    if (!swiping || cancelled) { swiping = false; return; }
    swiping = false;
    const dx = e.changedTouches[0].clientX - startX;
    card.style.transition = 'transform 0.2s ease';
    card.style.transform = '';
    reveal.style.opacity = 0;
    if (Math.abs(dx) >= THRESHOLD) {
      if (dx > 0) markDeleted(); else markDone();
    }
  }, { passive: true });
}

function deleteSale(idx) {
  const removed = salesLog.splice(idx, 1)[0];
  localStorage.setItem('carobiz_sales', JSON.stringify(salesLog));
  pushToSupabase();
  renderSalesView();
  renderSessionBar();
  toastWithUndo('Sale removed', () => {
    // Reinsert by timestamp, not the captured index — the list may have
    // shifted (new sale logged, another delete) before the undo fires
    const pos = salesLog.findIndex(s => (s.ts || '') < (removed.ts || ''));
    salesLog.splice(pos === -1 ? salesLog.length : pos, 0, removed);
    localStorage.setItem('carobiz_sales', JSON.stringify(salesLog));
    pushToSupabase();
    renderSalesView();
    renderSessionBar();
  });
}

function renderSalesView() {
  document.getElementById('revenue-display').textContent = '$' + todayRevenue().toFixed(2);
  const list = document.getElementById('sales-list');
  if (salesLog.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);font-size:13px;padding:24px 0">No sales yet</p>';
    renderBreakdown();
    return;
  }
  const today = getToday();
  let lastDate = null;
  list.innerHTML = salesLog.map((s, idx) => {
    let header = '';
    if (s.date !== lastDate) {
      lastDate = s.date;
      header = `<div style="font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-tertiary);padding:8px 4px 4px">${s.date === today ? 'Today' : esc(s.date)}</div>`;
    }
    const profit = s.sourceCost ? (s.price - s.sourceCost) : null;
    const meta = [s.category, profit !== null ? `+$${profit.toFixed(0)} profit` : null].filter(Boolean).join(' · ');
    return header + `<div class="sale-entry">
      <div class="sale-info">
        <div class="sale-name">${esc(s.name)}</div>
        <div class="sale-meta">${meta || esc(s.date)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="sale-price">$${parseFloat(s.price).toFixed(2)}</div>
        <button class="copy-btn" style="color:var(--danger);border-color:rgba(224,88,88,0.3)" onclick="deleteSale(${idx})">✕</button>
      </div>
    </div>`;
  }).join('');
  renderBreakdown();
}

function renderBreakdown() {
  const el = document.getElementById('sales-breakdown');
  if (!el) return;
  const withCat = salesLog.filter(s => s.category);
  if (withCat.length === 0) { el.innerHTML = ''; return; }
  const groups = {};
  for (const s of withCat) {
    if (!groups[s.category]) groups[s.category] = { count: 0, profit: 0 };
    groups[s.category].count++;
    groups[s.category].profit += s.price - (s.sourceCost || 0);
  }
  const rows = Object.entries(groups)
    .sort((a, b) => b[1].profit - a[1].profit)
    .map(([cat, g]) => `<div class="breakdown-row">
      <div class="breakdown-cat">${esc(cat)}</div>
      <div class="breakdown-stats">
        <span>${g.count} sale${g.count > 1 ? 's' : ''}</span>
        <span class="breakdown-profit">+$${g.profit.toFixed(0)}</span>
        <span>avg $${(g.profit / g.count).toFixed(0)}/sale</span>
      </div>
    </div>`).join('');
  el.innerHTML = `<div class="breakdown-card"><div class="breakdown-title">What's Selling</div>${rows}</div>`;
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('view-fix').style.display   = tab === 'fix'   ? 'block' : 'none';
  document.getElementById('view-new').style.display   = tab === 'new'   ? 'block' : 'none';
  document.getElementById('view-sales').style.display = tab === 'sales' ? 'block' : 'none';
  document.getElementById('view-done').style.display  = tab === 'done'  ? 'block' : 'none';
  document.getElementById('btn-fix').classList.toggle('active',   tab === 'fix');
  document.getElementById('btn-new').classList.toggle('active',   tab === 'new');
  document.getElementById('btn-sales').classList.toggle('active', tab === 'sales');
  document.getElementById('btn-done').classList.toggle('active',  tab === 'done');
  if (tab === 'fix') { renderFixView(); pullScraped('fix', true); }
  else if (tab === 'new') { renderNewView(); pullScraped('new', true); }
  else if (tab === 'sales') renderSalesView();
  else if (tab === 'done') {
    // Drop the cached search results — edits made elsewhere (FIX tab, another
    // device) would otherwise show stale until the query is retyped
    _listingsCache = [];
    _listingsEditingId = null;
    renderDoneView();
  }
}

let _lastFixIndex = -1;   // card slide-in fires only when this changes
let _doneSearchTimer = null;
let _listingsEditingId = null;
let _listingsCache = [];

const RECENT_HDR = '<p class="done-empty" style="margin-bottom:8px">Recently done — newest first. Type above to search all.</p>';

function renderDoneView() {
  const query = (document.getElementById('done-search')?.value || '').trim();
  const list = document.getElementById('done-list');
  if (!query) {
    // Recently-done list (newest first) loaded into the same editor as search —
    // so you can edit title/cost/links, open Shopee, Delete, or Send back to
    // FIX. Bad Carousell links (not /p/, /sell/, app.link) get flagged below.
    if (_listingsCache.length && _listingsEditingId) { _renderListingsResults(_listingsCache, RECENT_HDR); return; }
    const ids = [...new Set(doneData.slice()
      .sort((a, b) => (b.doneAt || '').localeCompare(a.doneAt || ''))
      .map(d => d.id).filter(Boolean))].slice(0, 25);
    if (!ids.length) { list.innerHTML = '<p class="done-empty">Type to search all listings</p>'; return; }
    list.innerHTML = '<p class="done-empty">Loading recent…</p>';
    sb.from('listings').select('id,title,shopee_url,carousell_url,source_cost,sell_price,status')
      .in('id', ids).then(({ data, error }) => {
        if (error || !data || !data.length) { list.innerHTML = '<p class="done-empty">Type to search all listings</p>'; return; }
        const ord = new Map(ids.map((id, i) => [id, i]));   // preserve newest-first order
        data.sort((a, b) => (ord.get(a.id) ?? 99) - (ord.get(b.id) ?? 99));
        _listingsCache = data;
        _renderListingsResults(data, RECENT_HDR);
      });
    return;
  }
  clearTimeout(_doneSearchTimer);
  if (_listingsCache.length && _listingsEditingId) {
    // re-render from cache when toggling edit
    _renderListingsResults(_listingsCache);
    return;
  }
  list.innerHTML = '<p class="done-empty">Searching…</p>';
  _doneSearchTimer = setTimeout(() => _searchAllListings(query), 300);
}

// A valid Carousell listing link points at a specific listing (/p/, /sell/) or
// is a Branch share link; a valid Shopee link is a product URL. Anything else —
// a homepage/category/search URL, the wrong platform, or empty — is "bad".
function validCaroLink(u) { return !!u && /carousell\./i.test(u) && /\/p\/|\/sell\/|app\.link/i.test(u); }
function validShopeeLink(u) { return !!u && /shopee\./i.test(u) && (/i\.\d+\.\d+/.test(u) || /\/product\/\d+\/\d+/.test(u)); }

// Scan ALL listings for links that don't belong: missing/wrong/homepage Shopee
// or Carousell links. Renders the offenders into the editable list so you can
// fix or delete each. Runs in your authed session (listings are owner-only RLS).
async function scanBadLinks() {
  const list = document.getElementById('done-list');
  list.innerHTML = '<p class="done-empty">Scanning all listings…</p>';
  try {
    const { data, error } = await sb.from('listings')
      .select('id,title,shopee_url,carousell_url,source_cost,sell_price,status')
      .limit(5000);
    if (error) throw error;
    const bad = (data || []).filter(d =>
      !validCaroLink(d.carousell_url) || !validShopeeLink(d.shopee_url));
    if (!bad.length) { list.innerHTML = '<p class="done-empty">✓ No bad links found across ' + (data || []).length + ' listings</p>'; return; }
    _listingsCache = bad;
    _listingsEditingId = null;
    _renderListingsResults(bad, '<p class="done-empty" style="margin-bottom:8px">⚠ ' + bad.length + ' of ' + data.length + ' listings have a bad Shopee/Carousell link — fix or delete below.</p>');
  } catch (e) {
    list.innerHTML = '<p class="done-empty">Scan failed — ' + (e.message || 'are you logged in?') + '</p>';
  }
}

async function _searchAllListings(query) {
  const list = document.getElementById('done-list');
  try {
    // Word-based match: require every word, in any order. Splitting on
    // non-alphanumerics strips the invisible junk a paste carries (non-breaking
    // spaces, pipes, dashes, newlines) that breaks exact-substring search.
    const terms = query.split(/[^\p{L}\p{N}]+/u).filter(t => t.length > 1).slice(0, 8);
    let q = sb
      .from('listings')
      .select('id,title,shopee_url,carousell_url,source_cost,sell_price,status');
    for (const t of terms.length ? terms : [query.trim()]) q = q.ilike('title', `%${t}%`);
    const { data, error } = await q.order('status').limit(30);
    if (error) throw error;
    if (!data.length) { list.innerHTML = '<p class="done-empty">No matches</p>'; return; }
    _listingsCache = data;
    _renderListingsResults(data);
  } catch (e) {
    list.innerHTML = `<p class="done-empty">Search failed</p>`;
  }
}

          ${validCaroLink(d.carousell_url)
            ? `<a class="link-btn" href="${esc(d.carousell_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Carousell ↗</a>`
            : (d.carousell_url
              ? `<a class="link-btn" href="${esc(d.carousell_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:#fbbf24;border-color:#d97706">⚠ not a listing link</a>`
              : `<span class="link-btn" style="color:#fbbf24;border-color:#d97706">⚠ no Carousell link</span>`)}
        </div>
      </div>
      <div class="done-edit-icon">✎</div>
    </div>`;
  }).join('');
}

async function listingsSave(id) {
  const title = document.getElementById(`let-${id}`)?.value?.trim();
  const cost  = parseFloat(document.getElementById(`lec-${id}`)?.value) || 0;
  const shopeeUrl = document.getElementById(`lesh-${id}`)?.value?.trim() || '';
  const carousellUrl = document.getElementById(`leca-${id}`)?.value?.trim() || '';
  if (!title) { toast('Title cannot be empty'); return; }
  const sell = calcSell(cost);
  const { error } = await sb.from('listings').update({
    title, shopee_url: shopeeUrl, carousell_url: carousellUrl, source_cost: cost, sell_price: sell
  }).eq('id', id);
  if (error) { toast('Save failed'); return; }
  const item = _listingsCache.find(l => l.id === id);
  if (item) { item.title = title; item.shopee_url = shopeeUrl; item.carousell_url = carousellUrl; item.source_cost = cost; item.sell_price = sell; }
  _listingsEditingId = null;
  toast('Saved ✓');
  _renderListingsResults(_listingsCache);
}

async function listingsMarkDone(id) {
  const { error } = await sb.from('listings').update({ status: 'done' }).eq('id', id);
  if (error) { toast('Failed'); return; }
  const item = _listingsCache.find(l => l.id === id);
  if (item) item.status = 'done';
  _listingsEditingId = null;
  toast('Marked as listed ✓');
  _renderListingsResults(_listingsCache);
}

async function listingsSendToFix(id) {
  const { error } = await sb.from('listings').update({ status: 'active' }).eq('id', id);
  if (error) { toast('Failed'); return; }
  // Drop its done-history entries too — otherwise the id-based doneSet rebuild
  // sees them on the next sync, assumes the status write failed, and silently
  // re-marks the listing done: it would never actually return to the queue.
  const removed = doneData.filter(d => d.id === id);
  if (removed.length) {
    doneData = doneData.filter(d => d.id !== id);
    doneTodayCount = Math.max(0, doneTodayCount -
      removed.filter(d => d.doneAt?.startsWith(getToday())).length);
    pushToSupabase();
  }
  // If it was done in this session it's still in the active array — unskip it
  const li = LISTINGS.findIndex(l => l.id === id);
  if (li !== -1) doneSet.delete(li);
  _listingsCache = _listingsCache.filter(l => l.id !== id);
  _listingsEditingId = null;
  renderSessionBar();
  toast('Sent back to FIX ✓');
  _renderListingsResults(_listingsCache);
}

async function listingsDelete(id) {
  const { error } = await sb.from('listings').delete().eq('id', id);
  if (error) { toast('Delete failed'); return; }
  _listingsCache = _listingsCache.filter(l => l.id !== id);
  _listingsEditingId = null;
  toast('Deleted ✓');
  _renderListingsResults(_listingsCache);
}


// Downloads a full JSON backup: every listings row plus the done/sales blobs.
// The only copy of this data lives in Supabase (no backups there), so this is
// the recovery path if a row is ever deleted or overwritten by mistake.
async function exportBackup() {
  toast('Preparing backup…');
  let listings;
  try {
    const { data, error } = await sb.from('listings').select('*').order('id');
    if (error) throw error;
    listings = data;
  } catch (e) {
    toast('Backup failed — could not read listings');
    return;
  }
  const payload = {
    exportedAt: new Date().toISOString(),
    listings,
    doneData,
    salesLog
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `workers-backup-${getToday()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  localStorage.setItem('carobiz_last_backup', new Date().toISOString());
  toast('Backup downloaded ✓');
}

function copyField(fieldId, btnId) {
  const el = document.getElementById(fieldId);
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(() => {
    const btn = document.getElementById(btnId);
    if (btn) {
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      clearTimeout(copyTimers[btnId]);
      copyTimers[btnId] = setTimeout(() => {
        const b = document.getElementById(btnId);
        if (b) { b.textContent = 'Copy'; b.classList.remove('copied'); }
        delete copyTimers[btnId];
      }, 1500);
    }
  });
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

let _undoFn = null;
function toastWithUndo(msg, undoFn) {
  _undoFn = undoFn;
  const el = document.getElementById('toast');
  el.innerHTML = `<span>${esc(msg)}</span><button class="toast-undo-btn" onclick="_undoFn&&_undoFn()">UNDO</button>`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('show'); _undoFn = null; }, 6000);
}

// Open the current FIX listing's Shopee/Carousell link in a new tab.
// Anchor click (not window.open) for iPhone PWA compatibility.
function openListingLink(kind) {
  const L = LISTINGS[currentIndex];
  if (!L) return;
  const url = kind === 'shopee' ? L.shopee : L.caro;
  if (!url) { toast(kind === 'shopee' ? 'No Shopee link' : 'No Carousell link'); return; }
  const a = document.createElement('a');
  a.href = url; a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  a.remove();
}

// Keyboard shortcuts for FIX tab (desktop)
document.addEventListener('keydown', e => {
  if (activeTab !== 'fix') return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;   // keep Ctrl+C / Cmd+C etc. intact
  if (e.target.matches('input, textarea, select')) return;
  // Arrows work even from the queue-complete screen (to navigate back)
  if (e.key === 'ArrowLeft')  { e.preventDefault(); navQueue(-1); return; }
  if (e.key === 'ArrowRight') { e.preventDefault(); navQueue(1); return; }
  if (currentIndex >= LISTINGS.length) return;
  if (e.key === 'd' || e.key === 'D') { e.preventDefault(); markDone(); }
  if (e.key === 'f' || e.key === 'F') { e.preventDefault(); fillAndDone(); }
  if (e.key === 'x' || e.key === 'X' || e.key === 'Delete') { e.preventDefault(); markDeleted(); }
  if (e.key === 's' || e.key === 'S') { e.preventDefault(); openListingLink('shopee'); }
  if (e.key === 'c' || e.key === 'C') { e.preventDefault(); openListingLink('caro'); }
  if (e.key === 'g' || e.key === 'G') { e.preventDefault(); if (!aiLoading) generateAI('both'); }
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  retryPendingPush();   // re-send any sync that failed while we were away
  if (getToday() !== todayDate) {
    todayDate = getToday();
    doneTodayCount = 0;
    deletedTodayCount = 0;
    renderAll();
  }
});

// ── Auth gate ────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  const btn   = document.getElementById('login-btn');
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Sign in';
  if (error) { err.textContent = error.message; return; }
  document.getElementById('login-overlay').style.display = 'none';
  init();
}

// Boot: if a session already exists (persisted in localStorage), start the app;
// otherwise show the login overlay. supabase-js attaches the JWT to every request
// once signed in, which is what the owner-scoped RLS policies require.
async function boot() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    init();
  } else {
    document.getElementById('login-overlay').style.display = 'flex';
  }
}
boot();
</script>
