<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Listing Generator</title>
<style>
  :root {
    --bg-deep: #050506;
    --text-primary: #FAFAFA;
    --text-secondary: #B8B6B0;
    --text-tertiary: #76746E;
    --success: #6BE3A4;
    --warning: #F2C063;
    --accent: #E07658;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.06);
    --card-radius: 16px;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --coral: var(--accent);
    --danger: #E05858;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 82% 14%, rgba(224,118,88,0.16) 0%, transparent 60%),
      radial-gradient(ellipse at 18% 90%, rgba(180,180,200,0.06) 0%, transparent 60%);
    filter: blur(40px);
    animation: bgDrift 36s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgDrift {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(20px,-15px) scale(1.04); }
    100% { transform: translate(-10px,10px) scale(0.97); }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #050506;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 32px) 20px 48px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .page-header p {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .field-label {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .field-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  textarea, input[type="text"], input[type="password"], input[type="url"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    resize: none;
    display: block;
  }
  textarea:focus, input:focus { outline: none; border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); }

  .input-mono { font-family: var(--font-mono); font-size: 13px; }

  .title-ta {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.45;
    overflow: hidden;
  }

  .desc-ta {
    font-size: 13px;
    line-height: 1.6;
    overflow: hidden;
  }

  .char-counter {
    font-size: 11px;
    color: var(--text-tertiary);
    text-align: right;
    margin-top: 4px;
    margin-bottom: 10px;
  }
  .char-counter.warn   { color: var(--warning); }
  .char-counter.danger { color: var(--danger); }

  .copy-btn {
    background: none;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .copy-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.15); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }

  .gen-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(224,118,88,0.25);
    background: rgba(224,118,88,0.1);
    color: var(--coral);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .gen-btn:hover   { background: rgba(224,118,88,0.18); }
  .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .save-teaser {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(107,227,164,0.12);
    background: rgba(107,227,164,0.04);
    color: rgba(107,227,164,0.35);
    font-size: 15px;
    font-weight: 700;
    cursor: not-allowed;
    margin-top: 10px;
    text-align: center;
    position: relative;
  }
  .save-teaser-badge {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--coral);
    opacity: 0.7;
    border: 1px solid rgba(224,118,88,0.3);
    border-radius: 4px;
    padding: 2px 6px;
  }

  .fetch-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .fetch-btn {
    white-space: nowrap;
    padding: 9px 14px;
    flex-shrink: 0;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .fetch-btn:hover    { background: rgba(255,255,255,0.11); }
  .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--card-border);
  }

  .ai-loading {
    font-size: 13px;
    color: var(--text-tertiary);
    padding: 8px 0;
    text-align: center;
  }

  /* Passcode overlay */
  #passcode-overlay {
    display: flex;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #050506;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .passcode-box {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
  }
  .passcode-box h2 {
    color: var(--text-primary);
    font-size: 18px;
    font-weight: 700;
  }
  .passcode-box p {
    color: var(--text-tertiary);
    font-size: 13px;
    margin-top: -4px;
  }
  .passcode-input {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 14px !important;
    border-radius: 12px !important;
  }
  .passcode-btn {
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: var(--coral);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .passcode-err {
    color: var(--danger);
    font-size: 13px;
    min-height: 16px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,22,0.92);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    backdrop-filter: blur(12px);
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .title-ta  { font-size: 16px; }
    .desc-ta   { font-size: 16px; }
    .gen-btn   { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- Passcode gate -->
<div id="passcode-overlay">
  <div class="passcode-box">
    <h2>Listing Generator</h2>
    <p>Enter the passcode to continue</p>
    <input id="passcode-input" class="passcode-input" type="password"
           placeholder="••••••••"
           onkeydown="if(event.key==='Enter')checkPasscode()">
    <button class="passcode-btn" onclick="checkPasscode()">Continue</button>
    <div class="passcode-err" id="passcode-err"></div>
  </div>
</div>

<div class="container" id="app" style="display:none">

  <div class="page-header">
    <h1>Listing Generator</h1>
    <p>Paste product info → get a Carousell title & description</p>
  </div>

  <!-- API Key -->
  <div class="card" id="key-card">
    <label class="field-label">Your Claude API Key</label>
    <div style="display:flex;gap:8px">
      <input class="input-mono" id="api-key-input" type="password" placeholder="sk-ant-api03-…" style="flex:1">
      <button class="copy-btn" onclick="saveKey()" style="padding:8px 14px">Save</button>
    </div>
    <div style="font-size:11px;color:var(--text-tertiary);margin-top:8px">
      Get a key at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" style="color:var(--coral)">console.anthropic.com</a> — used only in your browser, never sent to our server.
    </div>
  </div>

  <!-- Input card -->
  <div class="card">
    <label class="field-label">Shopee URLs — one per line</label>
    <textarea id="urls-ta" rows="4"
      placeholder="https://shopee.sg/product-name-i.123.456&#10;https://shopee.sg/another-item-i.789.012&#10;https://shopee.sg/…"
      oninput="autoResize(this)"></textarea>
    <button class="gen-btn" id="gen-btn" onclick="batchGenerate()" style="margin-top:12px">✨ Generate</button>
  </div>

  <!-- Results -->
  <div id="results"></div>

  <div id="gen-counter" style="text-align:center;font-size:11px;color:var(--text-tertiary);margin-top:8px"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const PASSCODE = 'listing2025';

function checkPasscode() {
  const val = document.getElementById('passcode-input').value;
  if (val === PASSCODE) {
    document.getElementById('passcode-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    genCountDisplay();
    const stored = localStorage.getItem('demo_claude_key');
    if (stored) {
      savedKey = stored;
      document.getElementById('api-key-input').value = stored;
      document.getElementById('key-card').style.display = 'none';
    }
  } else {
    document.getElementById('passcode-err').textContent = 'Incorrect passcode';
    document.getElementById('passcode-input').value = '';
  }
}

const GEN_LIMIT = 40;
let savedKey = '';
let loading = false;

function getGenCount() { return parseInt(localStorage.getItem('demo_gen_count') || '0', 10); }
function incGenCount() { localStorage.setItem('demo_gen_count', getGenCount() + 1); }
function genCountDisplay() {
  const el = document.getElementById('gen-counter');
  if (el) el.textContent = `${getGenCount()} / ${GEN_LIMIT} generations used`;
}

function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) { toast('Enter your API key first'); return; }
  savedKey = val;
  localStorage.setItem('demo_claude_key', val);
  document.getElementById('key-card').style.display = 'none';
  toast('Key saved');
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function updateCharCount(val, id) {
  const el = document.getElementById(id);
  if (!el) return;
  const len = val.length;
  el.textContent = len + ' / 225';
  el.className = 'char-counter' + (len > 225 ? ' danger' : len >= 200 ? ' warn' : '');
}

const copyTimers = {};
function copyField(taId, btnId) {
  const ta = document.getElementById(taId);
  const btn = document.getElementById(btnId);
  if (!ta || !ta.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    clearTimeout(copyTimers[btnId]);
    copyTimers[btnId] = setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ——— Prompts (same as work.html) ———

const TITLE_SYSTEM = `You are a Carousell Singapore listing title writer. Buyers find the listing by typing words into search, so the title must be packed with the DISTINCT, RELEVANT terms a real buyer would type for THIS specific item.

TASK: Write one Carousell title for the product below. Output the title text only — no JSON, no quotes, no explanation.

STEP 1 — Silently identify the category from the product text:
- FURNITURE / BULKY HOME (sofa, chair, table, shelf, bed, mattress, safe, cabinet, rack): buyers search by item type, size/dimensions, material, load/weight capacity, room, style.
- ELECTRONICS / GADGET (keyboard, charger, speaker, lamp, fan, small appliance): item type, key spec, connectivity, compatibility, standout feature.
- HOMEWARE / KITCHEN (plates, cookware, storage, organiser): item type, set/piece count, material, capacity/size, use.
- If unclear, lead with item type + strongest concrete attributes.

STEP 2 — Write the title:
1. Length: 180–225 characters. Count every character. This is the strictest rule.
2. Format: pipe-separated ( | ) Title Case segments, each 3–6 words, each a complete phrase a buyer could actually type into search.
3. Front-load the single strongest search phrase in the first 40 characters — the feed truncates the visible title there.
4. COVER DIFFERENT SEARCH ANGLES — never repeat the same phrase. Each segment adds a NEW angle: item-type synonyms, a real attribute (size, material, capacity, colour), a feature, a use case. You may reuse the core item word with a DIFFERENT modifier each time, but near-duplicate segments read as keyword stuffing and get listings hidden.
5. Use ONLY attributes that appear in the product text. NEVER invent dimensions, weights, materials, capacities or compatibility.
6. Correct spelling. Do not copy source typos.
7. NEVER include: brand names, model numbers/SKUs, platform names (Shopee, Carousell, Lazada, Amazon), seller phrases ("Local Seller", "SG Seller", "Fast Delivery"), prices, the words "Brand New / Free Shipping / nice / cheap / best", emojis, or the symbols ! @ # $ % * &.

GOOD (distinct angles, not repetition):
Plastic Stool | Modern Stackable Stool | Bathroom Stool | Dining Stool | Dressing Table Stool | Compact Side Stool | Space Saving Stool | Minimalist Home Furniture

BAD (same phrase repeated — gets hidden):
Gaming Keyboard | RGB Gaming Keyboard | Best Gaming Keyboard | Gaming Keyboard SG | Gaming Keyboard Cheap

Silently count characters. If under 180 or over 225, fix by adding or removing a DISTINCT angle — never by repeating a segment. Output only the final title.`;

const DESC_SYSTEM = `You are a Carousell Singapore listing copywriter. Output ONLY a JSON object: {"description":"..."}. Plain text inside — no markdown, no **bold**, no #headers.

STEP 1 — Silently detect the category from the product text: FURNITURE/BULKY, ELECTRONICS/GADGET, or HOMEWARE/KITCHEN. This sets the depth and which details lead.

STEP 2 — Choose depth:
- HIGH-TICKET BULKY FURNITURE (sofa, table, bed, mattress, large cabinet, shelf): fuller — 6 to 8 bullets, lead with what reassures a considered buyer.
- CHEAP / SIMPLE items (small homeware, gadgets, organisers): leaner — 3 to 5 bullets. Do not pad; an over-bulleted block on a cheap item reads as spam.

STEP 3 — Write in exactly this structure:

LINE 1 (must start with 🚚): a short, punchy delivery line. MUST always include the word "Free" and "Delivery". e.g. "🚚 Free Doorstep Delivery | 1-3 Working Days". You may vary the wording naturally (e.g. "Free Delivery", "Free Doorstep Delivery", "Free Shipping") but "Free" and "Delivery" must always appear. Keep it to one tight line — do NOT cram the value-sell here.

(blank line)

ONE hook sentence: what it is + 2–3 standout features + who/what it's for.

(blank line)

Bullets, each: ✅ [Feature] — [what it means for the buyer]. ORDER BY WHAT THIS BUYER DECIDES ON:
- FURNITURE/BULKY: dimensions FIRST (will it fit), then material/build, weight or load capacity, assembly, colour/finish, room/use.
- ELECTRONICS/GADGET: key specs first, then compatibility, connectivity, features, what's in the box.
- HOMEWARE/KITCHEN: set/piece count first, then material, dimensions/capacity, microwave/dishwasher/oven safe, care.
For BULKY items, include one value bullet worded to the item, e.g. "✅ Delivered To Your Door — no lorry to rent, no carrying it up yourself". For small/light items, skip this bullet (a delivery hard-sell looks overblown).
Always include: "✅ Brand New — unused" (sealed/flat-packed as appropriate).

If the source lists colour/size variants, add ONE line BEFORE the payment line: "📦 Sizes available: ..." or "📦 Finishes available: ...". Summarise many variants into a readable range (e.g. "45×30, 55×35, 65×42cm footprints · 1 to 5 layers") — do not dump every row. Omit this line entirely if there are no variants. Then add: "💬 Message us to order or check stock".

LAST LINE (exact, verbatim, nothing after it):
💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂

RULES:
- State ONLY facts in the product text. NEVER invent dimensions, weight, material, capacity or compatibility. If a key spec is missing, write a genuine benefit bullet instead — do not guess. Wrong specs cause returns.
- No brand names, no platform names (Shopee/Lazada/Amazon).
- No vague filler on its own ("high quality", "amazing", "best", "premium") — pair a concrete feature with a concrete benefit.
- Vary phrasing between listings so descriptions never read as mass-produced duplicates.
- Keep it scannable.`;

function normalizeDesc(text) {
  if (!text) return text;
  const DELIVERY = '🚚 Free Doorstep Delivery | 1-3 Working Days';
  const PAYMENT  = '💳 PayNow / PayLah / Bank Transfer / Credit & Debit Card / Carousell Buy Button accepted 🙂';
  let lines = text.split('\n');
  if (!lines[0].trim().startsWith('🚚')) {
    const idx = lines.findIndex(l => l.includes('🚚') || l.includes('FREE Local Delivery'));
    if (idx > 0) {
      const [found] = lines.splice(idx, 1);
      while (lines.length && !lines[0].trim()) lines.shift();
      lines = [found.trim(), '', ...lines];
    } else if (idx === -1) {
      lines = [DELIVERY, '', ...lines];
    }
  }
  const lastNonEmptyIdx = [...lines].map((l, i) => l.trim() ? i : -1).filter(i => i !== -1).pop();
  const hasPaymentAtEnd = lastNonEmptyIdx !== undefined && lines[lastNonEmptyIdx].trim() === PAYMENT;
  if (!hasPaymentAtEnd) {
    const idx = lines.findIndex(l => l.includes('💳') || l.includes('PayNow'));
    if (idx !== -1) lines.splice(idx, 1);
    while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
    lines.push('', PAYMENT);
  }
  return lines.join('\n');
}

async function callClaude(system, userContent, maxTokens, temperature = 0.3) {
  if (!savedKey) throw new Error('NO_KEY');
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': savedKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      temperature,
      system,
      messages: [{ role: 'user', content: userContent }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || '';
}

async function runAIGenerate(productText, { titleOnly = false, descOnly = false } = {}) {
  const productContent = `Product info:\n\n${productText}`;
  const titlePromise = descOnly  ? null : callClaude(TITLE_SYSTEM, productContent, 512);
  const descPromise  = titleOnly ? null : callClaude(DESC_SYSTEM, productContent, 1536, 0.5);
  let rawTitle = '';
  if (!descOnly) {
    let titleText = await titlePromise;
    rawTitle = titleText.trim().split('\n')[0].trim();
    if (rawTitle.length < 180) {
      const retry = await callClaude(TITLE_SYSTEM, productContent + '\n\nIMPORTANT: Previous attempt was too short. Reach at least 180 characters by ADDING A NEW DISTINCT ANGLE (a different feature, attribute, or use case). Do NOT repeat or pad existing segments.', 512);
      rawTitle = retry.trim().split('\n')[0].trim();
    }
    if (rawTitle.length > 225) {
      const parts = rawTitle.split(' | ');
      while (parts.length > 1 && parts.join(' | ').length > 225) parts.pop();
      rawTitle = parts.join(' | ');
    }
  }
  if (titleOnly) return { title: rawTitle, desc: '' };
  const descText = await descPromise;
  const descMatch = descText.match(/\{[\s\S]*\}/);
  let desc = '';
  if (descMatch) {
    try {
      desc = normalizeDesc(JSON.parse(descMatch[0]).description || '');
    } catch {
      const raw = descText.replace(/^\s*\{[^"]*"description"\s*:\s*"/, '').replace(/"\s*\}\s*$/, '');
      desc = normalizeDesc(raw);
    }
  }
  return { title: rawTitle, desc };
}

function setCardStatus(i, html) {
  const el = document.getElementById(`rs-${i}`);
  if (el) el.innerHTML = html;
}

function showCardOutput(i, title, desc) {
  const out = document.getElementById(`ro-${i}`);
  if (!out) return;
  const titleTa = document.getElementById(`rt-${i}`);
  const descTa  = document.getElementById(`rd-${i}`);
  if (titleTa) { titleTa.value = title; autoResize(titleTa); updateCharCount(title, `cc-${i}`); }
  if (descTa)  { descTa.value  = desc;  autoResize(descTa); }
  out.style.display = 'block';
  titleTa?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function copyById(taId, btnId) {
  const ta  = document.getElementById(taId);
  const btn = document.getElementById(btnId);
  if (!ta || !ta.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    clearTimeout(copyTimers[btnId]);
    copyTimers[btnId] = setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function createResultCard(i, url) {
  const shortUrl = url.replace(/^https?:\/\/(www\.)?/, '').slice(0, 60);
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `rc-${i}`;
  card.innerHTML = `
    <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(shortUrl)}</div>
    <div id="rs-${i}" class="ai-loading">Fetching…</div>
    <div id="ro-${i}" style="display:none">
      <div class="field-header" style="margin-top:4px">
        <span class="field-label">Title</span>
        <button class="copy-btn" id="ctb-${i}" onclick="copyById('rt-${i}','ctb-${i}')">Copy</button>
      </div>
      <textarea class="title-ta" id="rt-${i}"
        oninput="autoResize(this);updateCharCount(this.value,'cc-${i}')"></textarea>
      <div class="char-counter" id="cc-${i}">0 / 225</div>
      <div class="field-header" style="margin-top:4px">
        <span class="field-label">Description</span>
        <button class="copy-btn" id="cdb-${i}" onclick="copyById('rd-${i}','cdb-${i}')">Copy</button>
      </div>
      <textarea class="desc-ta" id="rd-${i}" oninput="autoResize(this)"></textarea>
      <div class="save-teaser" style="margin-top:12px">Save to Catalog<span class="save-teaser-badge">Full Version</span></div>
    </div>`;
  document.getElementById('results').appendChild(card);
}

async function batchGenerate() {
  if (loading) return;
  if (!savedKey) {
    document.getElementById('key-card').style.display = 'block';
    document.getElementById('api-key-input').focus();
    toast('Enter your API key first');
    return;
  }
  const urls = document.getElementById('urls-ta').value
    .split('\n').map(s => s.trim()).filter(s => s.startsWith('http'));
  if (!urls.length) { toast('Paste at least one Shopee URL'); return; }

  const remaining = GEN_LIMIT - getGenCount();
  if (remaining <= 0) { toast('Generation limit reached — contact us to upgrade'); return; }
  const toProcess = urls.slice(0, remaining);

  loading = true;
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('results').innerHTML = '';

  for (let i = 0; i < toProcess.length; i++) {
    const url = toProcess[i];
    createResultCard(i, url);

    try {
      // Fetch
      const res  = await fetch(`/api/shopee?url=${encodeURIComponent(url)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Fetch failed');
      const productText = [data.title, data.description].filter(Boolean).join('\n\n');
      if (!productText) throw new Error('No product text returned');

      setCardStatus(i, '<div class="ai-loading">Generating…</div>');

      // Generate
      const { title, desc } = await runAIGenerate(productText);
      incGenCount();
      genCountDisplay();
      setCardStatus(i, '');
      showCardOutput(i, title, desc);
    } catch (e) {
      setCardStatus(i, `<div style="color:var(--danger);font-size:12px">Error: ${esc(e.message || 'unknown')}</div>`);
    }
  }

  if (toProcess.length < urls.length) {
    toast(`Limit reached — processed ${toProcess.length} of ${urls.length}`);
  }

  loading = false;
  document.getElementById('gen-btn').disabled = false;
}
</script>
